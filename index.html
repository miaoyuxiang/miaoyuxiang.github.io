<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶字卡系統 - 同步診斷版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK 引入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "miaocard-shared-v1"; // 固定路徑

        window.FB = { auth, db, appId, doc, setDoc, onSnapshot, signInAnonymously, onAuthStateChanged };
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const Icons = {
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.97-2.354-5.397-5.293-5.493l-.407-.007c-1.396-4.515-5.59-7.5-10.3-7.5-5.523 0-10 4.477-10 10 0 .152.003.303.01.453C.835 11.83 0 13.067 0 14.5 0 16.985 2.015 19 4.5 19h13z"/></svg>,
            Database: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        };

        const App = () => {
            const [decks, setDecks] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [syncStatus, setSyncStatus] = React.useState('初始化中'); 
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);
            const [showStarredOnly, setShowStarredOnly] = React.useState(false);
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardBack: '', importText: '', importMode: 'append', newDeckName: '' });

            const fbRef = React.useRef(null);

            // 核心連線邏輯
            React.useEffect(() => {
                const init = async () => {
                    const checkFB = setInterval(async () => {
                        if (window.FB) {
                            clearInterval(checkFB);
                            const { auth, db, appId, doc, onSnapshot, signInAnonymously, onAuthStateChanged } = window.FB;
                            fbRef.current = window.FB;

                            try {
                                setSyncStatus('嘗試登入...');
                                await signInAnonymously(auth);
                                
                                onAuthStateChanged(auth, (user) => {
                                    if (user) {
                                        setSyncStatus('連線成功，讀取資料...');
                                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_decks');
                                        
                                        onSnapshot(docRef, (snap) => {
                                            if (snap.exists()) {
                                                setDecks(snap.data().decks || []);
                                            }
                                            setSyncStatus('已同步：' + appId);
                                            setLoading(false);
                                        }, (err) => {
                                            setSyncStatus('權限拒絕：請檢查 Firestore Rules');
                                            setLoading(false);
                                        });
                                    }
                                });
                            } catch (e) {
                                setSyncStatus('認證失敗：請開啟 Anonymous Auth');
                                setLoading(false);
                            }
                        }
                    }, 500);
                };
                init();
            }, []);

            // 儲存邏輯
            const handleDataChange = async (newDecks) => {
                setDecks(newDecks);
                if (fbRef.current) {
                    const { db, appId, doc, setDoc } = fbRef.current;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_decks');
                    try {
                        await setDoc(docRef, { decks: newDecks }, { merge: true });
                    } catch (e) {
                        console.error("寫入失敗", e);
                    }
                }
            };

            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            const filteredCards = showStarredOnly 
                ? allCards.map((c, i) => ({...c, originalIndex: i})).filter(c => c.isStarred) 
                : allCards.map((c, i) => ({...c, originalIndex: i}));
            const currentCard = filteredCards[currentCardIndex] || null;
            const totalCards = filteredCards.length;

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-500 font-bold mb-2">正在同步雲端...</p>
                        <p className="text-[10px] text-slate-400 font-mono">狀態: {syncStatus}</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center py-8 px-4 max-w-4xl mx-auto">
                    {/* 同步狀態條 */}
                    <div className="w-full bg-slate-800 text-white p-2 rounded-xl mb-6 flex items-center justify-between px-4 shadow-lg border-b-4 border-blue-600">
                        <div className="flex items-center gap-2">
                            <Icons.Database className="w-4 h-4 text-blue-400" />
                            <span className="text-[10px] font-black uppercase tracking-tighter">Live Status</span>
                        </div>
                        <span className="text-[10px] font-bold tracking-widest">{syncStatus}</span>
                    </div>

                    <div className="w-full text-center mb-8 relative">
                        <h1 className="text-4xl font-black text-slate-800 mb-6 tracking-tight">苗寶字卡系統</h1>
                        <div className="flex justify-center gap-3">
                            <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="px-5 py-2 bg-white border border-slate-200 rounded-full text-xs font-black shadow-sm hover:bg-slate-50 transition-all">📄 快速匯入</button>
                            <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="px-5 py-2 bg-blue-600 text-white rounded-full text-xs font-black shadow-md hover:bg-blue-700 transition-all">+ 新增卡組</button>
                        </div>
                    </div>

                    {decks.length === 0 ? (
                        <div className="w-full bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center shadow-sm">
                            <p className="text-slate-400 font-bold">雲端目前為空，請開始新增內容。</p>
                        </div>
                    ) : (
                        <div className="w-full">
                            {/* Decks Tab */}
                            <div className="flex overflow-x-auto bg-white p-2 rounded-2xl mb-8 border border-slate-100 gap-2 items-center shadow-sm">
                                {decks.map((cat, i) => (
                                    <button key={i} onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setIsFlipped(false); }} className={`flex-shrink-0 px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>{cat.category}</button>
                                ))}
                            </div>

                            <div className="flex justify-between items-center mb-5 px-1">
                                <h2 className="text-2xl font-bold text-slate-800 tracking-tight">{currentCategory.category}</h2>
                                <button onClick={() => setModalState({ isOpen: true, type: 'deleteDeck' })} className="text-rose-400 text-xs font-bold flex items-center gap-1 hover:text-rose-600 transition-colors"><Icons.Trash2 className="w-3 h-3"/> 刪除卡組</button>
                            </div>

                            {/* Flashcard Area */}
                            <div className="aspect-[4/3] md:aspect-[16/9] [perspective:1200px] mb-8">
                                {totalCards === 0 ? (
                                    <div className="w-full h-full bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center">
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="text-blue-600 font-black">+ 新增第一張卡</button>
                                    </div>
                                ) : (
                                    <div className={`relative w-full h-full transition-transform duration-700 [transform-style:preserve-3d] cursor-pointer ${isFlipped ? '[transform:rotateY(180deg)]' : ''}`} onClick={() => setIsFlipped(!isFlipped)}>
                                        <div className="absolute w-full h-full [backface-visibility:hidden] bg-white rounded-[2.5rem] shadow-xl flex flex-col items-center justify-center p-12 border-b-8 border-blue-500 text-center overflow-y-auto">
                                            <div className="absolute top-6 left-8 text-[10px] font-black bg-blue-50 text-blue-500 px-3 py-1 rounded-full uppercase tracking-widest">正面</div>
                                            <button onClick={(e) => {e.stopPropagation(); const nextDecks=[...decks]; nextDecks[activeCategoryIndex].cards[currentCard.originalIndex].isStarred = !currentCard.isStarred; handleDataChange(nextDecks);}} className={`absolute top-6 right-16 p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400' : 'text-slate-200 hover:text-yellow-400'}`}><Icons.Star className="w-6 h-6" fill={currentCard?.isStarred ? "currentColor" : "none"} /></button>
                                            <button onClick={(e) => {e.stopPropagation(); setModalState({isOpen: true, type: 'deleteCard'});}} className="absolute top-6 right-6 text-slate-200 hover:text-rose-500 p-2"><Icons.Trash2 className="w-6 h-6" /></button>
                                            <div className="text-2xl md:text-3xl text-slate-800 font-bold leading-snug w-full">{currentCard?.front}</div>
                                        </div>
                                        <div className="absolute w-full h-full [backface-visibility:hidden] [transform:rotateY(180deg)] bg-slate-800 rounded-[2.5rem] shadow-xl flex flex-col items-center justify-center p-12 border-b-8 border-rose-500 text-center overflow-y-auto">
                                            <div className="absolute top-6 left-8 text-[10px] font-black bg-rose-500/20 text-rose-400 px-3 py-1 rounded-full uppercase tracking-widest">背面</div>
                                            <div className="text-xl md:text-3xl text-white font-medium leading-relaxed w-full">{currentCard?.back}</div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Controls */}
                            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                                <div className="flex flex-col gap-2 w-full md:w-auto text-center md:text-left">
                                    <div className="bg-white border border-slate-100 px-6 py-2 rounded-2xl text-slate-400 font-black text-xs shadow-sm uppercase tracking-widest">Card {totalCards > 0 ? currentCardIndex + 1 : 0} / {totalCards}</div>
                                    <button onClick={() => {setShowStarredOnly(!showStarredOnly); setCurrentCardIndex(0);}} className={`px-6 py-2 rounded-2xl border text-[10px] font-black transition-all flex items-center justify-center gap-2 ${showStarredOnly ? 'bg-yellow-400 text-slate-900 border-yellow-400' : 'bg-white text-slate-400 hover:bg-slate-50'}`}>
                                        <Icons.Star className="w-3 h-3" fill={showStarredOnly ? "currentColor" : "none"} /> {showStarredOnly ? '顯示全部' : '只看重點星號'}
                                    </button>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button onClick={() => { setIsFlipped(false); setCurrentCardIndex(0); }} className="w-12 h-12 bg-white border border-slate-100 rounded-2xl flex items-center justify-center shadow-sm hover:bg-slate-50"><Icons.SkipBack className="w-4 h-4 text-slate-400"/></button>
                                    <button onClick={() => { setIsFlipped(false); setCurrentCardIndex(prev => (prev - 1 + totalCards) % totalCards); }} className="w-14 h-14 bg-white border border-slate-100 rounded-2xl flex items-center justify-center shadow-sm hover:bg-slate-50"><Icons.ChevronLeft className="w-6 h-6 text-slate-600"/></button>
                                    <button onClick={() => setModalState({isOpen: true, type: 'addCard'})} className="px-8 h-14 bg-blue-600 text-white rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">+ 新增</button>
                                    <button onClick={() => { setIsFlipped(false); setCurrentCardIndex(prev => (prev + 1) % totalCards); }} className="w-14 h-14 bg-white border border-slate-100 rounded-2xl flex items-center justify-center shadow-sm hover:bg-slate-50"><Icons.ChevronRight className="w-6 h-6 text-slate-600"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal 略... (包含快速匯入、新增卡組等) */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4 text-slate-800">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-8 relative">
                                <button onClick={() => setModalState({isOpen: false, type: null})} className="absolute top-8 right-8 text-slate-300 hover:text-slate-500"><Icons.X className="w-6 h-6"/></button>
                                
                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-black mb-6">📄 快速匯入文字</h3>
                                        <div className="flex gap-3 mb-6">
                                            <button onClick={() => setFormData({...formData, importMode: 'append'})} className={`flex-1 p-3 rounded-xl border font-bold text-[10px] ${formData.importMode === 'append' ? 'bg-blue-50 border-blue-600 text-blue-600' : 'text-slate-400'}`}>加入目前</button>
                                            <button onClick={() => setFormData({...formData, importMode: 'new'})} className={`flex-1 p-3 rounded-xl border font-bold text-[10px] ${formData.importMode === 'new' ? 'bg-blue-50 border-blue-600 text-blue-600' : 'text-slate-400'}`}>建立新卡組</button>
                                        </div>
                                        {formData.importMode === 'new' && <input type="text" className="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none font-bold" placeholder="新組名稱..." value={formData.newDeckName} onChange={e => setFormData({...formData, newDeckName: e.target.value})} />}
                                        <textarea rows="6" className="w-full bg-slate-50 p-4 rounded-2xl mb-6 text-sm outline-none resize-none font-medium shadow-inner" placeholder="格式範例：&#10;【正面】：Apple&#10;【背面】：蘋果" value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})}></textarea>
                                        <button onClick={() => {
                                            const newCards = [];
                                            const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                                            blocks.forEach(block => {
                                                const parts = block.split(/【背面】(?:：|:)?/);
                                                if (parts.length >= 2) newCards.push({ front: parts[0].trim(), back: parts.slice(1).join('【背面】：').trim(), isStarred: false });
                                            });
                                            const nextDecks = [...decks];
                                            if (decks.length === 0 || formData.importMode === 'new') {
                                                nextDecks.push({ category: formData.newDeckName.trim() || "新卡組", cards: newCards });
                                                setActiveCategoryIndex(nextDecks.length - 1);
                                            } else {
                                                nextDecks[activeCategoryIndex].cards = [...nextDecks[activeCategoryIndex].cards, ...newCards];
                                            }
                                            handleDataChange(nextDecks);
                                            setModalState({isOpen: false});
                                        }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">匯入至雲端</button>
                                    </div>
                                )}

                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-black mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none font-bold shadow-inner" placeholder="輸入名稱..." value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} />
                                        <button onClick={() => {
                                            if(!formData.deckName) return;
                                            const nextDecks = [...decks, {category: formData.deckName, cards: []}];
                                            handleDataChange(nextDecks);
                                            setActiveCategoryIndex(nextDecks.length - 1);
                                            setModalState({isOpen: false});
                                        }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-xl font-black mb-6 text-slate-800">新增單張字卡</h3>
                                        <textarea autoFocus rows="2" className="w-full bg-slate-50 p-4 rounded-2xl mb-4 outline-none font-bold shadow-inner" placeholder="正面內容" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        <textarea rows="4" className="w-full bg-slate-50 p-4 rounded-2xl mb-6 outline-none font-medium shadow-inner" placeholder="背面內容" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={() => {
                                            if(!formData.cardFront || !formData.cardBack) return;
                                            const nextDecks = [...decks];
                                            nextDecks[activeCategoryIndex].cards.push({ front: formData.cardFront, back: formData.cardBack, isStarred: false });
                                            handleDataChange(nextDecks);
                                            setModalState({isOpen: false});
                                        }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">儲存並同步</button>
                                    </div>
                                )}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center">
                                        <h3 className="text-xl font-black mb-8 text-slate-800">確定要刪除嗎？</h3>
                                        <div className="flex gap-3">
                                            <button onClick={() => setModalState({isOpen: false, type: null})} className="flex-1 bg-slate-100 py-4 rounded-2xl font-bold">取消</button>
                                            <button onClick={() => {
                                                const nextDecks = [...decks];
                                                if(modalState.type === 'deleteDeck') {
                                                    nextDecks.splice(activeCategoryIndex, 1);
                                                    setActiveCategoryIndex(Math.max(0, activeCategoryIndex - 1));
                                                } else {
                                                    nextDecks[activeCategoryIndex].cards.splice(currentCard.originalIndex, 1);
                                                    setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                                                }
                                                handleDataChange(nextDecks);
                                                setModalState({isOpen: false, type: null});
                                            }} className="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-black transition-colors">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
