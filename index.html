<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統 (自訂顏色版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserLocalPersistence).catch(console.error);

        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            List: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>,
            Volume2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Palette: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [filterStatus, setFilterStatus] = React.useState('all'); 
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [flipAngle, setFlipAngle] = React.useState(0);
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null, themeColor: '#503422', uiColor: '#EBE6E0', cardTextColor: '#374151', cardFontSize: '32' });
            const fileInputRef = React.useRef(null);
            
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDecks([]);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        setDecks(docSnap.data().decks || []);
                    }
                });
                return () => unsub();
            }, [user]);

            const syncToCloud = async (newDecks) => {
                if (!user) return;
                await setDoc(doc(db, "users", user.uid), { decks: newDecks });
            };

            const updateDecks = (newDecks) => {
                setDecks(newDecks);
                syncToCloud(newDecks);
            };

            const handleLogin = () => setPersistence(auth, browserLocalPersistence).then(() => signInWithPopup(auth, provider));
            const handleLogout = () => signOut(auth);

            const currentCategory = decks[activeCategoryIndex] || null;
            const themeColor = currentCategory?.themeColor || '#503422';
            const uiColor = currentCategory?.uiColor || '#EBE6E0';
            const cardTextColor = currentCategory?.cardTextColor || '#374151';
            const cardFontSize = currentCategory?.cardFontSize || '32';

            const allCards = currentCategory?.cards || [];
            const currentCardsWithIdx = allCards.map((c, idx) => ({ ...c, originalIndex: idx }));

            const currentCards = currentCardsWithIdx.filter(c => {
                if (filterStatus === 'all') return true;
                if (filterStatus === 'starred') return c.isStarred;
                return c.status === filterStatus;
            });
            
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;

            const handleSpeak = (e, text) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (/[\u3040-\u309f\u30a0-\u30ff]/.test(text)) utterance.lang = 'ja-JP'; 
                else if (/^[A-Za-z0-9\s.,!?'-]+$/.test(text)) utterance.lang = 'en-US'; 
                else utterance.lang = 'zh-TW'; 
                try { window.speechSynthesis.speak(utterance); } catch (e) {}
            };

            const handleFlip = () => totalCards > 0 && setFlipAngle(prev => prev + 180);
            const handleNext = () => totalCards > 0 && (setFlipAngle(0), setTimeout(() => setCurrentCardIndex(p => (p + 1) % totalCards), 150));
            const handlePrev = () => totalCards > 0 && (setFlipAngle(0), setTimeout(() => setCurrentCardIndex(p => (p - 1 + totalCards) % totalCards), 150));
            
            const handleShuffle = () => {
                if (totalCards <= 1) return;
                setFlipAngle(0);
                const newDecks = [...decks];
                // 打亂前先標記建立順序 (如果還沒有的話)
                newDecks[activeCategoryIndex].cards = newDecks[activeCategoryIndex].cards.map((c, i) => ({...c, createOrder: c.createOrder ?? i}));
                newDecks[activeCategoryIndex].cards.sort(() => Math.random() - 0.5);
                updateDecks(newDecks);
                setCurrentCardIndex(0);
            };

            const handleRestoreOrder = () => {
                if (!currentCategory) return;
                setFlipAngle(0);
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.sort((a, b) => (a.createOrder ?? 0) - (b.createOrder ?? 0));
                updateDecks(newDecks);
                setCurrentCardIndex(0);
            };

            const handleToggleStar = (e) => {
                e.stopPropagation();
                if (!currentCard) return;
                const newDecks = [...decks];
                const card = newDecks[activeCategoryIndex].cards[currentCard.originalIndex];
                card.isStarred = !card.isStarred;
                updateDecks(newDecks);
            };

            const handleRateAndNext = (e, status) => {
                if (e) e.stopPropagation();
                if (!currentCard) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[currentCard.originalIndex].status = status;
                updateDecks(newDecks); 
                handleNext();
            };

            const handleSaveTheme = () => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex] = { 
                    ...newDecks[activeCategoryIndex], 
                    themeColor: formData.themeColor, 
                    uiColor: formData.uiColor,
                    cardTextColor: formData.cardTextColor,
                    cardFontSize: formData.cardFontSize
                };
                updateDecks(newDecks);
                closeModal();
            };

            const handleAddDeck = () => {
                if (!formData.deckName.trim()) return;
                const newDecks = [...decks, { category: formData.deckName, cards: [], themeColor: '#503422', uiColor: '#EBE6E0', cardTextColor: '#374151', cardFontSize: '32' }];
                updateDecks(newDecks);
                setActiveCategoryIndex(newDecks.length - 1);
                closeModal();
            };

            const closeModal = () => {
                setModalState({ isOpen: false, type: null });
                setFormData(p => ({ ...p, deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', editIndex: null }));
            };

            const openThemeModal = () => {
                setFormData({ ...formData, themeColor, uiColor, cardTextColor, cardFontSize });
                setModalState({ isOpen: true, type: 'theme' });
            };

            // 翻轉邏輯：固定 正 -> 中 -> 背
            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                const base = [{ label: '正面', text: currentCard.front, theme: 'front' }];
                if (currentCard.middle) base.push({ label: '中間', text: currentCard.middle, theme: 'middle' });
                base.push({ label: '背面', text: currentCard.back, theme: 'back' });
                return base;
            }, [currentCard]);

            const targetStep = Math.floor(flipAngle / 180);
            const domFrontFace = faces.length > 0 ? faces[(targetStep % 2 === 0 ? targetStep : targetStep - 1) % faces.length] : null;
            const domBackFace = faces.length > 0 ? faces[(targetStep % 2 === 1 ? targetStep : Math.max(0, targetStep - 1)) % faces.length] : null;

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <style>{`
                        .preserve-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        .perspective-1000 { perspective: 1000px; }
                        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                    `}</style>

                    {/* 頂部標題 */}
                    <div className="w-full max-w-4xl flex justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <Icons.Cloud className="w-8 h-8 text-blue-500" />
                            <h1 className="text-3xl font-black text-gray-800 tracking-wide">苗寶雲端字卡</h1>
                        </div>
                        {user ? (
                            <div className="flex items-center gap-3 bg-white p-2 pr-5 rounded-full shadow-sm border border-gray-200">
                                <img src={user.photoURL} className="w-9 h-9 rounded-full border border-gray-100" />
                                <span className="text-sm font-bold text-gray-700">{user.displayName}</span>
                                <button onClick={handleLogout} className="text-xs text-red-500 hover:text-red-700 ml-2 font-medium">登出</button>
                            </div>
                        ) : (
                            <button onClick={handleLogin} className="bg-blue-600 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg">🔑 登入 Google</button>
                        )}
                    </div>

                    {user && (
                        <div className="w-full max-w-4xl">
                            {/* 工具列 - 顏色不變 */}
                            <div className="flex flex-wrap justify-center gap-3 mb-8">
                                <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="text-sm bg-white border px-4 py-2 rounded-full flex items-center shadow-sm text-gray-700 hover:bg-gray-50"><Icons.FileText className="w-4 h-4 mr-2" /> 快速匯入</button>
                                <button onClick={() => fileInputRef.current.click()} className="text-sm bg-white border px-4 py-2 rounded-full flex items-center shadow-sm text-gray-700 hover:bg-gray-50"><Icons.Upload className="w-4 h-4 mr-2" /> 匯入備份</button>
                                <button onClick={handleExport} className="text-sm bg-white border px-4 py-2 rounded-full flex items-center shadow-sm text-gray-700 hover:bg-gray-50"><Icons.Download className="w-4 h-4 mr-2" /> 匯出備份</button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                            </div>

                            {decks.length > 0 && (
                                <div className="w-full max-w-2xl mx-auto">
                                    {/* 卡組選擇 */}
                                    <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-2xl mb-6 border border-gray-200 gap-2 items-center shadow-sm">
                                        {decks.map((cat, i) => (
                                            <button key={i} onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setFlipAngle(0); setFilterStatus('all'); }} 
                                                className={`flex-shrink-0 px-5 py-2 rounded-xl text-sm font-bold transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                                                {cat.category}
                                            </button>
                                        ))}
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="flex-shrink-0 px-4 py-2 text-blue-600 text-sm font-bold hover:bg-blue-50 rounded-xl flex items-center"><Icons.Plus className="w-4 h-4 mr-1 border-2 border-current rounded-full" /> 新增</button>
                                    </div>

                                    {/* 卡組控制列 */}
                                    <div className="flex flex-wrap justify-between items-center mb-4 px-2 gap-3">
                                        <div className="flex items-center gap-3">
                                            <span className="font-bold text-xl" style={{ color: themeColor }}>{currentCategory.category}</span>
                                            <button onClick={openThemeModal} className="p-2 bg-white border rounded-xl shadow-sm text-gray-500 hover:text-blue-500 transition-colors"><Icons.Palette className="w-4 h-4" /></button>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <select value={filterStatus} onChange={(e) => {setFilterStatus(e.target.value); setCurrentCardIndex(0);}} className="text-sm font-bold px-3 py-2 rounded-xl bg-white border border-gray-200 text-gray-600 outline-none shadow-sm">
                                                <option value="all">全部</option>
                                                <option value="starred">⭐ 已標記</option>
                                                <option value="unfamiliar">🔴 不熟</option>
                                                <option value="familiar">🟡 印象</option>
                                                <option value="mastered">🟢 精熟</option>
                                            </select>
                                            <button onClick={() => setModalState({isOpen: true, type: 'cardList'})} className="text-sm font-bold px-3 py-2 rounded-xl bg-blue-50 text-blue-600 flex items-center shadow-sm"><Icons.List className="w-4 h-4 mr-1.5" /> 列表</button>
                                        </div>
                                    </div>

                                    {/* 字卡主體 */}
                                    <div className="aspect-[4/3] md:aspect-[16/10] perspective-1000 mb-3 w-full">
                                        {totalCards === 0 ? (
                                            <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed border-gray-300 flex items-center justify-center flex-col shadow-sm">
                                                <span className="text-gray-500 font-bold mb-4">沒有卡片喔！</span>
                                                <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="bg-blue-600 text-white px-6 py-3 rounded-full font-bold">新增第一張</button>
                                            </div>
                                        ) : (
                                            <div key={currentCard?.originalIndex} className="relative w-full h-full preserve-3d cursor-pointer" style={{ transform: `rotateY(${flipAngle}deg)`, transition: 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }} onClick={handleFlip}>
                                                {[domFrontFace, domBackFace].map((face, faceIdx) => (
                                                    <div key={faceIdx} className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center overflow-y-auto custom-scrollbar bg-white border-t-[6px] ${faceIdx === 1 ? 'rotate-y-180' : ''}`}
                                                        style={{ borderColor: themeColor }}>
                                                        
                                                        {/* 計數器 (固定顏色) */}
                                                        <div className="absolute top-5 left-1/2 -translate-x-1/2 text-xs font-black bg-gray-100 text-gray-400 px-4 py-1.5 rounded-full border shadow-sm">
                                                            {currentCardIndex + 1} / {totalCards}
                                                        </div>

                                                        {/* 標籤 */}
                                                        <div className="absolute top-5 left-6 text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider text-white" style={{ background: themeColor }}>
                                                            {face?.label}
                                                        </div>
                                                        
                                                        {/* 右上角操作 */}
                                                        <div className="absolute top-5 right-5 flex gap-2">
                                                            <button onClick={handleToggleStar} className={`p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400 bg-yellow-50' : 'text-gray-300 bg-gray-50'}`}>
                                                                <Icons.Star className="w-5 h-5" fill={currentCard?.isStarred ? "currentColor" : "none"} />
                                                            </button>
                                                            <button onClick={(e) => { e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' }); }} className="p-2 text-gray-300 hover:text-red-500 bg-gray-50 rounded-full transition-colors"><Icons.Trash2 className="w-4 h-4" /></button>
                                                        </div>

                                                        {/* 主文字 */}
                                                        <div className="font-bold whitespace-pre-wrap leading-relaxed w-full px-4" style={{ color: cardTextColor, fontSize: `${cardFontSize}px` }}>
                                                            {face?.text}
                                                        </div>
                                                        
                                                        <button onClick={(e) => handleSpeak(e, face?.text)} className="mt-5 p-3 text-gray-300 hover:text-blue-500 rounded-full transition-colors"><Icons.Volume2 className="w-6 h-6" /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* 評分按鈕 */}
                                    {totalCards > 0 && (
                                        <div className="grid grid-cols-3 gap-2 md:gap-4 w-full mb-3">
                                            <button onClick={(e) => handleRateAndNext(e, 'unfamiliar')} style={{ background: uiColor }} className="text-red-600 py-3 md:py-4 rounded-2xl font-bold text-sm shadow-sm">不熟</button>
                                            <button onClick={(e) => handleRateAndNext(e, 'familiar')} style={{ background: uiColor }} className="text-yellow-600 py-3 md:py-4 rounded-2xl font-bold text-sm shadow-sm">有印象</button>
                                            <button onClick={(e) => handleRateAndNext(e, 'mastered')} style={{ background: uiColor }} className="text-green-600 py-3 md:py-4 rounded-2xl font-bold text-sm shadow-sm">精熟</button>
                                        </div>
                                    )}
                                    
                                    {/* 底部工具欄 */}
                                    {totalCards > 0 && (
                                        <div className="flex items-center justify-center gap-2 md:gap-3 w-full bg-white p-3 rounded-2xl shadow-sm border">
                                            <button onClick={handlePrev} className="w-10 h-10 bg-gray-50 text-gray-600 rounded-full flex items-center justify-center"><Icons.ChevronLeft className="w-5 h-5"/></button>
                                            <button onClick={handleShuffle} style={{ background: uiColor }} className="px-4 py-2.5 text-gray-800 rounded-full text-sm font-bold flex items-center"><Icons.Shuffle className="w-4 h-4 mr-1.5" />打亂</button>
                                            <button onClick={handleRestoreOrder} style={{ background: uiColor }} className="px-4 py-2.5 text-gray-800 rounded-full text-sm font-bold flex items-center"><Icons.RotateCcw className="w-4 h-4 mr-1.5" />還原順序</button>
                                            <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="px-4 py-2.5 bg-blue-600 text-white rounded-full text-sm font-bold flex items-center"><Icons.Plus className="w-4 h-4 mr-1.5" />新增</button>
                                            <button onClick={openNoteModal} className="px-4 py-2.5 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold flex items-center"><Icons.FileText className="w-4 h-4 mr-1.5" />備註</button>
                                            <button onClick={handleNext} className="w-10 h-10 bg-gray-50 text-gray-600 rounded-full flex items-center justify-center"><Icons.ChevronRight className="w-5 h-5"/></button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {/* 所有彈出視窗 */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4">
                            <div className={`bg-white rounded-3xl shadow-2xl w-full relative transition-all ${modalState.type === 'cardList' ? 'max-w-4xl p-6' : 'max-w-md p-8'}`}>
                                <button onClick={closeModal} className="absolute top-6 right-6 text-gray-400 hover:bg-gray-100 p-2 rounded-full transition-colors z-10"><Icons.X className="w-5 h-5" /></button>
                                
                                {modalState.type === 'theme' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">自訂卡組視覺</h3>
                                        <div className="space-y-4">
                                            <div><label className="text-sm font-bold block mb-1">主題色 (卡組名 & 邊框)</label><input type="color" className="w-full h-12 rounded-xl border-none cursor-pointer" value={formData.themeColor} onChange={e => setFormData({...formData, themeColor: e.target.value})} /></div>
                                            <div><label className="text-sm font-bold block mb-1">UI 按鈕色 (底部背景色)</label><input type="color" className="w-full h-12 rounded-xl border-none cursor-pointer" value={formData.uiColor} onChange={e => setFormData({...formData, uiColor: e.target.value})} /></div>
                                            <div><label className="text-sm font-bold block mb-1">卡片文字顏色</label><input type="color" className="w-full h-12 rounded-xl border-none cursor-pointer" value={formData.cardTextColor} onChange={e => setFormData({...formData, cardTextColor: e.target.value})} /></div>
                                            <div><label className="text-sm font-bold block mb-1">卡片文字大小 ({formData.cardFontSize}px)</label><input type="range" min="16" max="60" className="w-full" value={formData.cardFontSize} onChange={e => setFormData({...formData, cardFontSize: e.target.value})} /></div>
                                        </div>
                                        <button onClick={handleSaveTheme} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-8 shadow-lg">儲存視覺設定</button>
                                    </div>
                                )}

                                {modalState.type === 'cardList' && (
                                    <div className="w-full">
                                        <h3 className="text-xl font-bold mb-6 flex items-center pr-10" style={{ color: themeColor }}><Icons.List className="w-7 h-7 mr-3" /> {currentCategory?.category}</h3>
                                        <div className="max-h-[60vh] overflow-y-auto custom-scrollbar space-y-3">
                                            {allCards.map((c, idx) => (
                                                <div key={idx} className="flex flex-col md:flex-row items-center justify-between p-4 rounded-2xl border bg-gray-50 hover:border-blue-300 gap-3">
                                                    <div className="flex-1 truncate font-bold text-gray-800">{c.front}</div>
                                                    <div className="flex items-center gap-2">
                                                        <select value={c.status || 'unrated'} onChange={(e) => handleUpdateCardStatus(idx, e.target.value)} className="text-sm font-bold px-2 py-1.5 rounded-lg border bg-white shadow-sm">
                                                            <option value="unrated">⚪ 未評</option><option value="unfamiliar">🔴 不熟</option><option value="familiar">🟡 印象</option><option value="mastered">🟢 精熟</option>
                                                        </select>
                                                        <button onClick={() => { closeModal(); openEditModal(idx); }} className="p-1.5 text-blue-500 bg-white border rounded-lg shadow-sm"><Icons.Edit className="w-5 h-5" /></button>
                                                        <button onClick={() => handleDeleteCardFromList(idx)} className="p-1.5 text-gray-400 bg-white border rounded-lg shadow-sm"><Icons.Trash2 className="w-5 h-5" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border-2 p-4 rounded-2xl mb-6 focus:border-blue-500 outline-none" placeholder="輸入名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleAddDeck()} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">快速匯入文字</h3>
                                        <div className="flex gap-2 mb-6">
                                            <button onClick={() => handleCopyAIPrompt('2sided')} className="flex-1 text-xs font-bold bg-purple-50 text-purple-600 py-3 rounded-xl border border-purple-100">✨ 雙面提示詞</button>
                                            <button onClick={() => handleCopyAIPrompt('3sided')} className="flex-1 text-xs font-bold bg-emerald-50 text-emerald-600 py-3 rounded-xl border border-emerald-100">✨ 三面提示詞</button>
                                        </div>
                                        <textarea rows="6" className="w-full border-2 p-4 rounded-2xl mb-6 text-sm outline-none resize-none" placeholder="【正面】：Apple\n【背面】：蘋果" value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})}></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold shadow-lg">開始解析</button>
                                    </div>
                                )}

                                {(modalState.type === 'addCard' || modalState.type === 'editCard') && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 pr-10">{modalState.type === 'editCard' ? '編輯字卡' : '新增字卡'}</h3>
                                        <div className="flex gap-4 mb-5 bg-gray-50 p-3 rounded-2xl">
                                            <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={formData.cardType === '2sided'} onChange={() => setFormData({...formData, cardType: '2sided'})} /> <span className="text-sm font-bold">雙面</span></label>
                                            <label className="flex items-center gap-2 cursor-pointer"><input type="radio" checked={formData.cardType === '3sided'} onChange={() => setFormData({...formData, cardType: '3sided'})} /> <span className="text-sm font-bold">三面</span></label>
                                        </div>
                                        <div className="space-y-3 mb-6">
                                            <textarea autoFocus rows="2" className="w-full border-2 p-3 rounded-xl outline-none" placeholder="正面" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                            {formData.cardType === '3sided' && <textarea rows="2" className="w-full border-2 p-3 rounded-xl outline-none border-emerald-200" placeholder="中間" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>}
                                            <textarea rows="2" className="w-full border-2 p-3 rounded-xl outline-none" placeholder="背面" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        </div>
                                        <button onClick={modalState.type === 'editCard' ? handleEditCardSave : handleAddCard} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存設定</button>
                                    </div>
                                )}

                                {modalState.type === 'editNote' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 flex items-center pr-10"><Icons.FileText className="w-6 h-6 mr-2 text-indigo-500" /> 備註內容</h3>
                                        <textarea autoFocus rows="6" className="w-full border-2 p-4 rounded-2xl mb-6 text-base outline-none resize-none" placeholder="輸入備註..." value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})}></textarea>
                                        <button onClick={handleSaveNote} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存備註</button>
                                    </div>
                                )}
                                
                                {modalState.type === 'deleteDeck' && (
                                    <div className="text-center">
                                        <Icons.Trash2 className="w-16 h-16 text-red-500 mx-auto mb-6" />
                                        <h3 className="text-2xl font-bold mb-8">確定要刪除卡組嗎？</h3>
                                        <div className="flex gap-4"><button onClick={closeModal} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">取消</button><button onClick={handleDeleteDeck} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold">確定刪除</button></div>
                                    </div>
                                )}
                                
                                {modalState.type === 'deleteCard' && (
                                    <div className="text-center">
                                        <Icons.Trash2 className="w-16 h-16 text-red-500 mx-auto mb-6" />
                                        <h3 className="text-2xl font-bold mb-8">確定刪除這張字卡嗎？</h3>
                                        <div className="flex gap-4"><button onClick={closeModal} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">取消</button><button onClick={handleDeleteCard} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold">確定刪除</button></div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
