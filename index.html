<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統 (個人化主題版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserLocalPersistence).catch(console.error);

        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            List: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>,
            Volume2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            RotateCw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [filterStatus, setFilterStatus] = React.useState('all'); 
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [flipAngle, setFlipAngle] = React.useState(0);
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null });
            
            // 自訂顏色管理
            const [colors, setColors] = React.useState({
                theme: '#503422', // 卡組名與頂部細線
                btnAndFont: '#EBE6E0' // 按鈕背景與文字
            });

            const fileInputRef = React.useRef(null);
            
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (!currentUser) setDecks([]);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setDecks(data.decks || []);
                        if (data.colors) setColors(data.colors);
                    }
                });
                return () => unsub();
            }, [user]);

            const syncToCloud = async (newDecks, newColors = colors) => {
                if (!user) return;
                await setDoc(doc(db, "users", user.uid), { decks: newDecks, colors: newColors });
            };

            const updateDecks = (newDecks) => {
                setDecks(newDecks);
                syncToCloud(newDecks);
            };

            const handleLogin = () => signInWithPopup(auth, provider);
            const handleLogout = () => signOut(auth);

            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            
            const currentCardsWithIdx = allCards.map((c, idx) => ({ ...c, originalIndex: idx }));

            const currentCards = currentCardsWithIdx.filter(c => {
                if (filterStatus === 'all') return true;
                if (filterStatus === 'starred') return c.isStarred;
                return c.status === filterStatus;
            });
            
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;

            const handleSpeak = (e, text) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if (/[\u3040-\u309f\u30a0-\u30ff]/.test(text)) utterance.lang = 'ja-JP'; 
                else if (/^[A-Za-z0-9\s.,!?'-]+$/.test(text)) utterance.lang = 'en-US'; 
                else utterance.lang = 'zh-TW'; 
                try { window.speechSynthesis.speak(utterance); } catch (e) {}
            };

            const handleCopyAIPrompt = (type) => {
                const promptText = type === '2sided' 
                    ? "請幫我製作字卡，格式：\n【正面】：(單字)\n【背面】：(解釋)"
                    : "請幫我製作字卡，格式：\n【正面】：(漢字)\n【中間】：(假名)\n【背面】：(解釋)";
                navigator.clipboard.writeText(promptText).then(() => {
                    alert("✅ 已複製！提醒：請自行調整括號內容。");
                });
            };

            const handleTextImport = () => {
                if (!formData.importText.trim()) return;
                const cards = [];
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                blocks.forEach(block => {
                    if (block.includes('【中間】')) {
                        const parts1 = block.split(/【中間】(?:：|:)?/);
                        const parts2 = parts1[1].split(/【背面】(?:：|:)?/);
                        cards.push({ front: parts1[0].trim(), middle: parts2[0].trim(), back: parts2[1].trim(), status: 'unrated', isStarred: false });
                    } else {
                        const parts = block.split(/【背面】(?:：|:)?/);
                        cards.push({ front: parts[0].trim(), back: parts[1].trim(), status: 'unrated', isStarred: false });
                    }
                });
                const newDecks = formData.importMode === 'new' ? [...decks, { category: formData.newDeckName || "新卡組", cards }] : decks.map((d, i) => i === activeCategoryIndex ? {...d, cards: [...d.cards, ...cards]} : d);
                updateDecks(newDecks);
                closeModal();
            };

            const handleFlip = () => totalCards > 0 && setFlipAngle(prev => prev + 180);
            const handleNext = () => totalCards > 1 && (setFlipAngle(0), setTimeout(() => setCurrentCardIndex(prev => (prev + 1) % totalCards), 150));
            const handlePrev = () => totalCards > 1 && (setFlipAngle(0), setTimeout(() => setCurrentCardIndex(prev => (prev - 1 + totalCards) % totalCards), 150));
            
            // 恢復原本順序
            const handleRestoreOrder = () => {
                if (!currentCategory) return;
                const newDecks = [...decks];
                // 假設 originalIndex 就是加入時的順序（此處邏輯為不做 sort 即可回到 Firebase 原始儲存順序，如果要做物理恢復則重新存一次）
                // 這裡我們直接對當前卡組不排序，讓 Firebase 的 snapshots 自動還原原始順序
                alert("已恢復原始匯入順序");
                setCurrentCardIndex(0);
                setFlipAngle(0);
            };

            const handleShuffle = () => {
                if (totalCards <= 1) return;
                setFlipAngle(0);
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.sort(() => Math.random() - 0.5);
                updateDecks(newDecks);
                setCurrentCardIndex(0);
            };

            const handleRateAndNext = (e, status) => {
                if (e) e.stopPropagation();
                if (!currentCard) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[currentCard.originalIndex].status = status;
                updateDecks(newDecks); 
                handleNext();
            };

            const toggleStar = (e) => {
                e.stopPropagation();
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[currentCard.originalIndex].isStarred = !currentCard.isStarred;
                updateDecks(newDecks);
            };

            const closeModal = () => setModalState({ isOpen: false, type: null });
            const openNoteModal = () => setFormData({ ...formData, note: currentCard.note || '' }), setModalState({ isOpen: true, type: 'editNote' });
            const handleSaveNote = () => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[currentCard.originalIndex].note = formData.note;
                updateDecks(newDecks);
                closeModal();
            };

            // ====== 動態多面翻轉邏輯 ======
            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                const base = [{ label: '正面', text: currentCard.front, theme: 'front' }];
                if (currentCard.middle) base.push({ label: '中間', text: currentCard.middle, theme: 'middle' });
                base.push({ label: '背面', text: currentCard.back, theme: 'back' });
                return base;
            }, [currentCard]);

            const targetStep = Math.floor(flipAngle / 180);
            const domFrontFace = faces.length > 0 ? faces[targetStep % 2 === 0 ? targetStep % faces.length : (targetStep - 1) % faces.length] : null;
            const domBackFace = faces.length > 0 ? faces[targetStep % 2 === 1 ? targetStep % faces.length : (targetStep - 1) % faces.length] : null;

            const getTextSizeClass = (text) => {
                if (!text) return 'text-3xl';
                const len = text.length;
                if (len > 60) return 'text-lg';
                if (len > 30) return 'text-xl';
                return 'text-3xl';
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .preserve-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        .perspective-1000 { perspective: 1000px; }
                    `}</style>

                    {/* 頂部導覽 */}
                    <div className="w-full max-w-4xl flex justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <Icons.Cloud className="w-8 h-8 text-blue-500" />
                            <h1 className="text-2xl font-black text-gray-800">苗寶雲端字卡</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setModalState({isOpen: true, type: 'colorSetting'})} className="text-sm font-bold bg-white border border-gray-200 px-4 py-2 rounded-full hover:bg-gray-50 shadow-sm">🎨 顏色設定</button>
                            {user ? <button onClick={handleLogout} className="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-full">登出</button> : <button onClick={handleLogin} className="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-bold">Google 登入</button>}
                        </div>
                    </div>

                    {user && (
                        <div className="w-full max-w-4xl">
                            <div className="flex flex-wrap justify-center gap-3 mb-8">
                                <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="text-sm bg-white border px-4 py-2 rounded-full text-gray-700 shadow-sm hover:bg-gray-50"><Icons.FileText className="w-4 h-4 inline mr-2" />快速匯入</button>
                                <button onClick={() => fileInputRef.current.click()} className="text-sm bg-white border px-4 py-2 rounded-full text-gray-700 shadow-sm hover:bg-gray-50"><Icons.Upload className="w-4 h-4 inline mr-2" />匯入備份</button>
                                <button onClick={handleExport} className="text-sm bg-white border px-4 py-2 rounded-full text-gray-700 shadow-sm hover:bg-gray-50"><Icons.Download className="w-4 h-4 inline mr-2" />匯出備份</button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                            </div>

                            {decks.length > 0 && (
                                <div className="w-full max-w-2xl mx-auto">
                                    <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-2xl mb-6 border border-gray-200 gap-2 items-center">
                                        {decks.map((cat, i) => (
                                            <button key={i} onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setFlipAngle(0); }} className={`px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>{cat.category}</button>
                                        ))}
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="px-4 py-2 text-blue-600 font-bold hover:bg-blue-50 rounded-xl"><Icons.Plus className="w-4 h-4" /></button>
                                    </div>

                                    {/* 控制與標題 */}
                                    <div className="flex flex-wrap justify-between items-center mb-4 px-2 gap-3">
                                        <span className="font-bold text-xl" style={{color: colors.theme}}>{currentCategory.category}</span>
                                        <div className="flex items-center gap-2">
                                            <select value={filterStatus} onChange={(e) => {setFilterStatus(e.target.value); setCurrentCardIndex(0);}} className="text-sm font-bold px-3 py-2 rounded-xl bg-white border border-gray-200 text-gray-600 shadow-sm">
                                                <option value="all">全部</option>
                                                <option value="starred">⭐ 已標記星號</option>
                                                <option value="unfamiliar">🔴 不熟</option>
                                                <option value="familiar">🟡 有印象</option>
                                                <option value="mastered">🟢 精熟</option>
                                            </select>
                                            <button onClick={() => setModalState({isOpen: true, type: 'cardList'})} className="text-sm font-bold px-4 py-2 rounded-xl bg-blue-50 text-blue-600 shadow-sm hover:bg-blue-100"><Icons.List className="w-4 h-4" /></button>
                                        </div>
                                    </div>

                                    {/* 字卡 */}
                                    <div className="aspect-[4/3] md:aspect-[16/10] perspective-1000 mb-3 w-full">
                                        {totalCards > 0 ? (
                                            <div key={currentCard?.originalIndex} className="relative w-full h-full preserve-3d cursor-pointer" style={{ transform: `rotateY(${flipAngle}deg)`, transition: 'transform 0.5s' }} onClick={handleFlip}>
                                                {[domFrontFace, domBackFace].map((face, fIdx) => (
                                                    <div key={fIdx} className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border-t-[6px] text-center overflow-y-auto ${fIdx === 1 ? 'rotate-y-180' : ''}`} style={{ backgroundColor: face?.theme === 'back' ? '#333' : 'white', borderTopColor: colors.theme }}>
                                                        <div className="absolute top-5 left-1/2 -translate-x-1/2 text-xs font-bold text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">{currentCardIndex + 1} / {totalCards}</div>
                                                        <button onClick={toggleStar} className="absolute top-5 left-5 p-2 rounded-full transition-colors hover:bg-yellow-50">
                                                            <Icons.Star className="w-6 h-6" fill={currentCard.isStarred ? "#fbbf24" : "none"} stroke={currentCard.isStarred ? "#fbbf24" : "#ccc"} />
                                                        </button>
                                                        <button onClick={(e) => {e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' });}} className="absolute top-5 right-5 p-2 text-gray-300 hover:text-red-500"><Icons.Trash2 className="w-5 h-5" /></button>
                                                        <div className={`font-bold whitespace-pre-wrap leading-relaxed w-full px-4 mt-2 ${getTextSizeClass(face?.text)}`} style={{ color: face?.theme === 'back' ? '#fff' : colors.btnAndFont }}>{face?.text}</div>
                                                        <button onClick={(e) => handleSpeak(e, face?.text)} className="mt-5 p-3 text-gray-300 hover:text-blue-500 rounded-full bg-gray-50/50 transition-colors"><Icons.Volume2 className="w-5 h-5" /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-400 font-bold">沒有符合條件的卡片</div>}
                                    </div>

                                    {/* 下方控制 */}
                                    <div className="grid grid-cols-3 gap-2 md:gap-4 mb-3">
                                        <button onClick={(e) => handleRateAndNext(e, 'unfamiliar')} className="py-4 rounded-2xl font-bold text-red-600 shadow-sm" style={{backgroundColor: colors.btnAndFont}}>不熟</button>
                                        <button onClick={(e) => handleRateAndNext(e, 'familiar')} className="py-4 rounded-2xl font-bold text-yellow-600 shadow-sm" style={{backgroundColor: colors.btnAndFont}}>有印象</button>
                                        <button onClick={(e) => handleRateAndNext(e, 'mastered')} className="py-4 rounded-2xl font-bold text-green-600 shadow-sm" style={{backgroundColor: colors.btnAndFont}}>精熟</button>
                                    </div>

                                    <div className="flex items-center justify-center gap-2 w-full bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                                        <button onClick={handleFirstCard} className="w-10 h-10 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center"><Icons.SkipBack className="w-4 h-4"/></button>
                                        <button onClick={handlePrev} className="w-10 h-10 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center"><Icons.ChevronLeft className="w-5 h-5"/></button>
                                        <button onClick={handleShuffle} className="px-4 py-2 bg-gray-800 text-white rounded-full text-sm font-bold flex items-center"><Icons.Shuffle className="w-4 h-4 mr-1" />打亂</button>
                                        <button onClick={handleRestoreOrder} className="px-4 py-2 bg-gray-500 text-white rounded-full text-sm font-bold flex items-center" title="恢復原本匯入順序"><Icons.RotateCw className="w-4 h-4 mr-1" />恢復順序</button>
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-bold flex items-center"><Icons.Plus className="w-4 h-4 mr-1" />新增</button>
                                        <button onClick={openNoteModal} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold flex items-center"><Icons.FileText className="w-4 h-4" /></button>
                                        <button onClick={handleNext} className="w-10 h-10 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center"><Icons.ChevronRight className="w-5 h-5"/></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 所有 Modal */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center z-50 p-4 animate-[fadeIn_0.2s]">
                            <div className={`bg-white rounded-3xl shadow-2xl w-full relative p-8 ${modalState.type === 'cardList' ? 'max-w-4xl' : 'max-w-md'}`}>
                                <button onClick={closeModal} className="absolute top-6 right-6 text-gray-400 hover:bg-gray-100 p-2 rounded-full"><Icons.X className="w-5 h-5" /></button>
                                
                                {modalState.type === 'colorSetting' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">🎨 自訂畫面顏色</h3>
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-600 mb-2">卡組名稱與頂部裝飾線顏色 (#503422)</label>
                                                <div className="flex gap-3 items-center">
                                                    <input type="color" value={colors.theme} onChange={(e) => setColors({...colors, theme: e.target.value})} className="w-12 h-12 rounded-lg cursor-pointer"/>
                                                    <input type="text" value={colors.theme} onChange={(e) => setColors({...colors, theme: e.target.value})} className="flex-1 border p-2 rounded-lg font-mono text-sm uppercase"/>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-gray-600 mb-2">按鈕背景與卡片字體顏色 (#EBE6E0)</label>
                                                <div className="flex gap-3 items-center">
                                                    <input type="color" value={colors.btnAndFont} onChange={(e) => setColors({...colors, btnAndFont: e.target.value})} className="w-12 h-12 rounded-lg cursor-pointer"/>
                                                    <input type="text" value={colors.btnAndFont} onChange={(e) => setColors({...colors, btnAndFont: e.target.value})} className="flex-1 border p-2 rounded-lg font-mono text-sm uppercase"/>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => syncToCloud(decks, colors).then(closeModal)} className="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">儲存並套用</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">快速匯入文字</h3>
                                        <div className="flex gap-2 mb-4">
                                            <button onClick={() => handleCopyAIPrompt('2sided')} className="flex-1 text-xs font-bold bg-purple-50 text-purple-600 py-2 rounded-xl border border-purple-100">✨ 雙面提示詞</button>
                                            <button onClick={() => handleCopyAIPrompt('3sided')} className="flex-1 text-xs font-bold bg-emerald-50 text-emerald-600 py-2 rounded-xl border border-emerald-100">✨ 三面提示詞</button>
                                        </div>
                                        <textarea rows="8" className="w-full border p-4 rounded-2xl mb-4 text-sm focus:outline-none" value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})} placeholder="請貼上字卡文字內容..."></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold">解析並匯入</button>
                                    </div>
                                )}

                                {modalState.type === 'cardList' && (
                                    <div className="max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                                        <h3 className="text-xl font-bold mb-6 flex items-center"><Icons.List className="w-6 h-6 mr-2 text-blue-500" /> {currentCategory?.category} 列表</h3>
                                        <div className="space-y-3">
                                            {allCards.map((c, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border gap-3">
                                                    <div className="flex-1 truncate font-bold text-gray-800">{c.front}</div>
                                                    <div className="flex items-center gap-2">
                                                        <select value={c.status} onChange={(e) => handleUpdateCardStatus(idx, e.target.value)} className="text-sm border rounded-lg px-2 py-1">
                                                            <option value="unrated">⚪ 未評</option>
                                                            <option value="unfamiliar">🔴 不熟</option>
                                                            <option value="familiar">🟡 印象</option>
                                                            <option value="mastered">🟢 精熟</option>
                                                        </select>
                                                        <button onClick={() => openEditModal(idx)} className="text-blue-500 p-1"><Icons.Edit className="w-4 h-4" /></button>
                                                        <button onClick={() => handleDeleteCardFromList(idx)} className="text-gray-400 p-1"><Icons.Trash2 className="w-4 h-4" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4">新增字卡</h3>
                                        <div className="flex gap-4 mb-4 bg-gray-50 p-2 rounded-xl">
                                            <label className="flex-1 text-center py-2 rounded-lg cursor-pointer font-bold transition-all" onClick={() => setFormData({...formData, cardType: '2sided'})} style={formData.cardType==='2sided'?{backgroundColor:colors.theme, color:'white'}:{}}>雙面</label>
                                            <label className="flex-1 text-center py-2 rounded-lg cursor-pointer font-bold transition-all" onClick={() => setFormData({...formData, cardType: '3sided'})} style={formData.cardType==='3sided'?{backgroundColor:colors.theme, color:'white'}:{}}>三面</label>
                                        </div>
                                        <textarea autoFocus rows="2" className="w-full border p-3 rounded-xl mb-3" placeholder="正面內容" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        {formData.cardType === '3sided' && <textarea rows="2" className="w-full border p-3 rounded-xl mb-3" placeholder="中間內容" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>}
                                        <textarea rows="2" className="w-full border p-3 rounded-xl mb-4" placeholder="背面內容" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={handleAddCard} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">儲存</button>
                                    </div>
                                )}
                                
                                {modalState.type === 'editNote' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 flex items-center"><Icons.FileText className="w-6 h-6 mr-2 text-indigo-500" /> 專屬備註</h3>
                                        <textarea autoFocus rows="8" className="w-full border p-4 rounded-2xl mb-6 focus:border-indigo-500 outline-none" value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} placeholder="在這裡編輯備註..."></textarea>
                                        <button onClick={handleSaveNote} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all">儲存備註</button>
                                    </div>
                                )}

                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border p-4 rounded-2xl mb-6 focus:border-blue-500 outline-none" placeholder="輸入名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">建立</button>
                                    </div>
                                )}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center">
                                        <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500"><Icons.Trash2 className="w-10 h-10" /></div>
                                        <h3 className="text-2xl font-bold mb-8">確定要刪除嗎？</h3>
                                        <div className="flex gap-4">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 py-4 rounded-2xl font-bold">取消</button>
                                            <button onClick={modalState.type === 'deleteDeck' ? handleDeleteDeck : handleDeleteCard} className="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold shadow-lg">刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
