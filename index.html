<body class="bg-gray-50 font-sans">

    <script type="text/babel" data-type="module">
        // 1. 引入 Firebase SDK [cite: 1]

        // 2. Firebase 配置 [cite: 3]

            messagingSenderId: "39206538337", [cite: 3]
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20", [cite: 3]
            measurementId: "G-5V0PWWG70Z" [cite: 4]
        };

        const app = initializeApp(firebaseConfig); [cite: 4]

        const auth = getAuth(app); [cite: 5]

        // 3. 圖示組件 [cite: 6]
        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>, [cite: 6]

            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>, [cite: 7]
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>, [cite: 7]
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>, [cite: 7, 8]
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>, [cite: 8]
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>, [cite: 8]
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>, [cite: 8, 9]
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>, [cite: 9]
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>, [cite: 9, 10]
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>, [cite: 10]
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>, [cite: 10, 11]
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>, [cite: 11]
            Cloud: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg> [cite: 11, 12]
        };

        const App = () => { [cite: 13]
            // 狀態管理
            const [user, setUser] = React.useState(null); [cite: 13]
            const [decks, setDecks] = React.useState([]); [cite: 14]
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0); [cite: 14]
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0); [cite: 14]
            const [showStarredOnly, setShowStarredOnly] = React.useState(false); [cite: 14]
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null }); [cite: 15]
            const [flipAngle, setFlipAngle] = React.useState(0); [cite: 16]
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardMiddle: '', cardBack: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided' }); [cite: 17]
            const fileInputRef = React.useRef(null); [cite: 18]
            
            // 監聽登入狀態 [cite: 17]
            React.useEffect(() => { [cite: 18]
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => { [cite: 18]
                    setUser(currentUser); [cite: 18]
                    if (!currentUser) setDecks([]); [cite: 18]
                }); [cite: 19]
                return () => unsubscribe(); [cite: 19]
            }, []); [cite: 19]

            // 監聽雲端資料庫 [cite: 19]
            React.useEffect(() => { [cite: 20]
                if (!user) return; [cite: 20]
                const unsub = onSnapshot(doc(db, "users", user.uid), (docSnap) => { [cite: 20]
                    if (docSnap.exists()) { [cite: 20]
                        setDecks(docSnap.data().decks || []); [cite: 21]
                    } [cite: 21]
                }); [cite: 21]
                return () => unsub(); [cite: 21]
            }, [user]); [cite: 21]

            // 同步至雲端的通用函式 [cite: 21]
            const syncToCloud = async (newDecks) => { [cite: 22]
                if (!user) return; [cite: 22]
                await setDoc(doc(db, "users", user.uid), { decks: newDecks }); [cite: 23]
            }; [cite: 23]

            const updateDecks = (newDecks) => { [cite: 23]
                setDecks(newDecks); [cite: 23]
                syncToCloud(newDecks); [cite: 24]
            }; [cite: 24]

            const handleLogin = () => signInWithPopup(auth, provider); [cite: 24]
            const handleLogout = () => signOut(auth); [cite: 24]

            // 資料計算 [cite: 25]
            const currentCategory = decks[activeCategoryIndex] || null; [cite: 25, 26]
            const allCards = currentCategory?.cards || []; [cite: 26]
            const currentCardsWithIdx = allCards.map((c, idx) => ({ ...c, originalIndex: idx })); [cite: 26]
            const currentCards = showStarredOnly ? currentCardsWithIdx.filter(c => c.isStarred) : currentCardsWithIdx; [cite: 27]
            const currentCard = currentCards[currentCardIndex] || null; [cite: 27]
            const totalCards = currentCards.length; [cite: 27]

            // 快捷鍵控制 [cite: 27]
            React.useEffect(() => { [cite: 28]
                const handleKeyDown = (e) => { [cite: 28]
                    if (modalState.isOpen || !user) return; [cite: 28]
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return; [cite: 28]
                    if (e.key === 'ArrowRight') handleNext(); [cite: 29]
                    else if (e.key === 'ArrowLeft') handlePrev(); [cite: 29]
                    else if (e.key === ' ' || e.key === 'Enter') { [cite: 29]
                        e.preventDefault(); [cite: 29]
                        handleFlip(); [cite: 30]
                    } [cite: 30]
                }; [cite: 30]
                window.addEventListener('keydown', handleKeyDown); [cite: 30]
                return () => window.removeEventListener('keydown', handleKeyDown); [cite: 30]
            }, [currentCardIndex, flipAngle, totalCards, modalState.isOpen, activeCategoryIndex, decks, showStarredOnly, user]); [cite: 31]

            // ===== 各種操作函式 ===== [cite: 32]

            const handleExport = () => { [cite: 32]
                if (decks.length === 0) return; [cite: 32]
                const dataStr = JSON.stringify(decks, null, 2); [cite: 33]
                const blob = new Blob([dataStr], { type: "application/json" }); [cite: 33]
                const url = URL.createObjectURL(blob); [cite: 33]
                const a = document.createElement('a'); [cite: 34]
                a.href = url; [cite: 34]
                a.download = `flashcards_cloud_backup.json`; [cite: 34]
                document.body.appendChild(a); [cite: 34]
                a.click(); [cite: 34]
                document.body.removeChild(a); [cite: 34]
            }; [cite: 34]

            const handleFileChange = (event) => { [cite: 35]
                const file = event.target.files[0]; [cite: 35]
                if (!file) return; [cite: 36]
                const reader = new FileReader(); [cite: 36]
                reader.onload = (e) => { [cite: 36]
                    try { [cite: 36]
                        const importedData = JSON.parse(e.target.result); [cite: 36]
                        if (Array.isArray(importedData)) { [cite: 37]
                            if (window.confirm("確定要覆蓋目前雲端資料嗎？操作無法復原。")) { [cite: 37]
                                updateDecks(importedData); [cite: 37]
                                setActiveCategoryIndex(0); [cite: 38]
                                setCurrentCardIndex(0); [cite: 38]
                                setShowStarredOnly(false); [cite: 38]
                            } [cite: 38]
                        } [cite: 38]
                    } catch (error) { [cite: 38]
                        alert("讀取失敗，檔案格式錯誤"); [cite: 38]
                    } [cite: 39]
                }; [cite: 39]
                reader.readAsText(file); [cite: 39]
                event.target.value = null; [cite: 40]
            }; [cite: 40]

            // 快速匯入文字 [cite: 40]
            const handleTextImport = () => { [cite: 40]
                if (!formData.importText.trim()) return; [cite: 40]
                const cards = []; [cite: 41]
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== ''); [cite: 41]
                
                blocks.forEach(block => {
                    // 偵測是否包含中間面 (三面模式)
                    if (block.includes('【中間】')) {
                        const parts1 = block.split(/【中間】(?:：|:)?/);
                        const front = parts1[0].trim();
                        const parts2 = parts1[1].split(/【背面】(?:：|:)?/);
                        if (parts2.length >= 2) {
                            const middle = parts2[0].trim();
                            const back = parts2.slice(1).join('【背面】：').trim();
                            cards.push({ front, middle, back, isStarred: false });
                        }
                    } else {
                        // 雙面模式
                        const parts = block.split(/【背面】(?:：|:)?/);
                        if (parts.length >= 2) {
                            cards.push({ front: parts[0].trim(), back: parts.slice(1).join('【背面】：').trim(), isStarred: false });
                        }
                    }
                });

                if (cards.length === 0) { [cite: 47]
                    alert("找不到符合格式的字卡，請確認是否包含「【正面】：」與「【背面】：」"); [cite: 47]
                    return; [cite: 48]
                } [cite: 48]

                if (decks.length === 0 || formData.importMode === 'new') { [cite: 48]
                    const newName = formData.newDeckName.trim() || "新匯入卡組"; [cite: 48, 49]
                    const newDecks = [...decks, { category: newName, cards: cards }]; [cite: 49]
                    updateDecks(newDecks); [cite: 49]
                    setActiveCategoryIndex(newDecks.length - 1); [cite: 49]
                    setCurrentCardIndex(0); [cite: 49]
                    setShowStarredOnly(false); [cite: 49]
                } else { [cite: 50]
                    const newDecks = [...decks]; [cite: 50]
                    newDecks[activeCategoryIndex].cards = [ [cite: 51]
                        ...newDecks[activeCategoryIndex].cards, [cite: 51]
                        ...cards [cite: 51]
                    ]; [cite: 51]
                    updateDecks(newDecks); [cite: 52]
                } [cite: 52]
                
                closeModal(); [cite: 52]
                setTimeout(() => alert(`🎉 成功匯入 ${cards.length} 張字卡，並已同步至雲端！`), 100); [cite: 53]
            }; [cite: 53]

            // 翻轉角度增加 180 度 [cite: 53]
            const handleFlip = () => totalCards > 0 && setFlipAngle(prev => prev + 180); [cite: 53]

            const handleFirstCard = () => { [cite: 54]
                if (totalCards <= 1 || currentCardIndex === 0) return; [cite: 54]
                setFlipAngle(0); [cite: 55]
                setCurrentCardIndex(0); [cite: 55]
            }; [cite: 55]

            const handleNext = React.useCallback(() => { [cite: 55]
                if (totalCards <= 1) return; [cite: 55]
                setFlipAngle(0); [cite: 55]
                setTimeout(() => setCurrentCardIndex((prev) => (prev + 1) % totalCards), 150); [cite: 55]
            }, [totalCards]); [cite: 55]

            const handlePrev = React.useCallback(() => { [cite: 56]
                if (totalCards <= 1) return; [cite: 56]
                setFlipAngle(0); [cite: 56]
                setTimeout(() => setCurrentCardIndex((prev) => (prev - 1 + totalCards) % totalCards), 150); [cite: 56]
            }, [totalCards]); [cite: 56]

            const handleShuffle = () => { [cite: 57]
                if (totalCards <= 1) return; [cite: 57]
                setFlipAngle(0); [cite: 58]
                const newDecks = [...decks]; [cite: 58]
                newDecks[activeCategoryIndex].cards.sort(() => Math.random() - 0.5); [cite: 58]
                updateDecks(newDecks); [cite: 58]
                setCurrentCardIndex(0); [cite: 58]
            }; [cite: 58]

            const handleToggleStar = (e) => { [cite: 59]
                e.stopPropagation(); [cite: 59]
                if (!currentCard) return; [cite: 60]
                const newDecks = [...decks]; [cite: 60]
                const originalIdx = currentCard.originalIndex; [cite: 60]
                const currentStatus = newDecks[activeCategoryIndex].cards[originalIdx].isStarred; [cite: 60]
                newDecks[activeCategoryIndex].cards[originalIdx].isStarred = !currentStatus; [cite: 60]
                updateDecks(newDecks); [cite: 60]
                if (showStarredOnly && currentStatus === true) { [cite: 61]
                    if (currentCardIndex >= currentCards.length - 1) { [cite: 61]
                        setCurrentCardIndex(Math.max(0, currentCardIndex - 1)); [cite: 61]
                    } [cite: 62]
                } [cite: 62]
            }; [cite: 62]

            const handleAddDeck = () => { [cite: 63]
                if (!formData.deckName.trim()) return; [cite: 63]
                const newDecks = [...decks, { category: formData.deckName, cards: [] }]; [cite: 64]
                updateDecks(newDecks); [cite: 64]
                setActiveCategoryIndex(newDecks.length - 1); [cite: 64]
                setCurrentCardIndex(0); [cite: 64]
                setShowStarredOnly(false); [cite: 64]
                closeModal(); [cite: 64]
            }; [cite: 64]

            const handleAddCard = () => { [cite: 65]
                if (!formData.cardFront.trim() || !formData.cardBack.trim()) return; [cite: 65]
                const newDecks = [...decks]; [cite: 66]
                
                const newCard = { front: formData.cardFront, back: formData.cardBack, isStarred: false }; [cite: 66]
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) { [cite: 67]
                    newCard.middle = formData.cardMiddle; [cite: 67]
                } [cite: 68]

                newDecks[activeCategoryIndex].cards.push(newCard); [cite: 68]
                updateDecks(newDecks); [cite: 68]
                if (showStarredOnly) setShowStarredOnly(false); [cite: 69]
                setCurrentCardIndex(newDecks[activeCategoryIndex].cards.length - 1); [cite: 69]
                closeModal(); [cite: 69]
            }; [cite: 69]

            const handleDeleteDeck = () => { [cite: 69]
                const newDecks = decks.filter((_, idx) => idx !== activeCategoryIndex); [cite: 69]
                updateDecks(newDecks); [cite: 70]
                setActiveCategoryIndex(Math.max(0, activeCategoryIndex - 1)); [cite: 70]
                setCurrentCardIndex(0); [cite: 70]
                setShowStarredOnly(false); [cite: 70]
                closeModal(); [cite: 70]
            }; [cite: 70]

            const handleDeleteCard = () => { [cite: 70]
                const newDecks = [...decks]; [cite: 70]
                newDecks[activeCategoryIndex].cards.splice(currentCard.originalIndex, 1); [cite: 71]
                updateDecks(newDecks); [cite: 71]
                setCurrentCardIndex(Math.max(0, currentCardIndex - 1)); [cite: 71]
                closeModal(); [cite: 71]
            }; [cite: 71]

            const closeModal = () => { [cite: 71]
                setModalState({ isOpen: false, type: null }); [cite: 71]
                setFormData(prev => ({ ...prev, deckName: '', cardFront: '', cardMiddle: '', cardBack: '', importText: '', newDeckName: '' })); [cite: 72]
            }; [cite: 73]

            // ====== 動態多面翻轉引擎邏輯 ====== [cite: 73]
            
            // 決定這張卡片有幾面 [cite: 73]
            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                if (currentCard.middle) {
                    return [
                        { label: '正面', text: currentCard.front, theme: 'front' },
                        { label: '中間', text: currentCard.middle, theme: 'middle' },
                        { label: '背面', text: currentCard.back, theme: 'back' }
                    ];
                }
                return [
                    { label: '正面', text: currentCard.front, theme: 'front' },
                    { label: '背面', text: currentCard.back, theme: 'back' }
                ];
            }, [currentCard]);

            const totalFaces = faces.length; [cite: 77]
            const steps = Math.floor(flipAngle / 180); [cite: 77]
            
            // 計算目前與下一次應該顯示哪一面 [cite: 78]
            const currentFaceIdx = totalFaces > 0 ? steps % totalFaces : 0; [cite: 78, 79]
            const nextFaceIdx = totalFaces > 0 ? (steps + 1) % totalFaces : 0; [cite: 79]
            
            // 判斷當前物理 DOM 是看到正面還是背面 [cite: 80]
            const isDomFrontVisible = steps % 2 === 0; [cite: 80]
            const domFrontFace = isDomFrontVisible ? faces[currentFaceIdx] : faces[nextFaceIdx]; [cite: 81]
            const domBackFace = isDomFrontVisible ? faces[nextFaceIdx] : faces[currentFaceIdx]; [cite: 81]

            // 顏色主題產生器 [cite: 82]
            const getFaceClasses = (theme) => { [cite: 82]
                if (theme === 'front') return { bg: 'bg-white', border: 'border-blue-500', text: 'text-gray-800', badgeText: 'text-blue-500', badgeBg: 'bg-blue-50', iconClass: 'text-gray-300 hover:text-yellow-400 hover:bg-gray-50', trashClass: 'text-gray-300 hover:text-red-500 hover:bg-red-50' }; [cite: 82]
                if (theme === 'middle') return { bg: 'bg-emerald-50', border: 'border-emerald-500', text: 'text-emerald-900', badgeText: 'text-emerald-600', badgeBg: 'bg-emerald-100', iconClass: 'text-emerald-300 hover:text-yellow-500 hover:bg-emerald-100', trashClass: 'text-emerald-300 hover:text-red-500 hover:bg-emerald-100' }; [cite: 83]
                if (theme === 'back') return { bg: 'bg-gray-800', border: 'border-yellow-400', text: 'text-white', badgeText: 'text-yellow-400', badgeBg: 'bg-gray-700', iconClass: 'text-gray-500 hover:text-yellow-400 hover:bg-gray-700', trashClass: 'text-gray-500 hover:text-red-400 hover:bg-gray-700' }; [cite: 84]
                return {}; [cite: 85]
            }; [cite: 85]

            const frontTheme = getFaceClasses(domFrontFace?.theme); [cite: 85]
            const backTheme = getFaceClasses(domBackFace?.theme); [cite: 85]

            return ( [cite: 86]
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
                        .preserve-3d { transform-style: preserve-3d; }
                        .backface-hidden { backface-visibility: hidden; }
                        .rotate-y-180 { transform: rotateY(180deg); }
                        .perspective-1000 { perspective: 1000px; }
                    `}</style>

                    {/* 頂部標題與登入區 [cite: 89] */}
                    <div className="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <Icons.Cloud className="w-8 h-8 text-blue-500" />
                            <h1 className="text-3xl font-black text-gray-800 tracking-wide">苗寶雲端字卡</h1>
                        </div>
                        
                        {user ? (
                            <div className="flex items-center gap-3 bg-white p-2 pr-5 rounded-full shadow-sm border border-gray-200">
                                <img src={user.photoURL} className="w-9 h-9 rounded-full border border-gray-100" />
                                <span className="text-sm font-bold text-gray-700">{user.displayName}</span>
                                <button onClick={handleLogout} className="text-xs text-red-500 hover:text-red-700 ml-2 font-medium bg-red-50 px-3 py-1 rounded-full">登出</button>
                            </div>
                        ) : (
                            <button onClick={handleLogin} className="bg-blue-600 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2">
                                🔑 登入 Google 同步
                            </button>
                        )}
                    </div>

                    {!user ? (
                        <div className="w-full max-w-2xl bg-white p-12 rounded-3xl shadow-xl text-center border mt-10">
                            <div className="bg-blue-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-500">
                                <Icons.Cloud className="w-12 h-12" />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-4">歡迎使用雲端同步系統</h2>
                            <p className="text-gray-500 mb-8 leading-relaxed">登入後即可在電腦與手機間自動同步字卡。<br/>你辛苦建立的單字庫，隨時隨地學習不中斷！</p>
                            <button onClick={handleLogin} className="bg-gray-800 text-white px-8 py-4 rounded-2xl font-bold hover:bg-black transition-colors shadow-lg">
                                使用 Google 帳號登入開始
                            </button>
                        </div>
                    ) : (
                        <div className="w-full max-w-4xl">
                            {/* 工具列 (匯入/匯出) */}
                            <div className="flex flex-wrap justify-center gap-3 mb-8">
                                <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700">
                                    <Icons.FileText className="w-4 h-4 mr-2" /> 快速匯入文字
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700">
                                    <Icons.Upload className="w-4 h-4 mr-2" /> 匯入備份 (覆蓋)
                                </button>
                                <button onClick={handleExport} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700">
                                    <Icons.Download className="w-4 h-4 mr-2" /> 匯出備份 (JSON)
                                </button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                            </div>

                            {decks.length === 0 ? (
                                <div className="w-full max-w-2xl mx-auto bg-white p-12 rounded-3xl border-2 border-dashed border-gray-300 text-center">
                                    <Icons.PlusCircle />
                                    <h2 className="text-xl font-bold text-gray-700 mb-4">尚未建立卡組</h2>
                                    <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition-colors">建立新卡組</button>
                                </div>
                            ) : (
                                <div className="w-full max-w-2xl mx-auto">
                                    {/* 卡組選擇分頁 [cite: 108] */}
                                    <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-2xl mb-6 border border-gray-200 gap-2 items-center shadow-sm">
                                        {decks.map((cat, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setFlipAngle(0); setShowStarredOnly(false); }} 
                                                className={`flex-shrink-0 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}
                                            >
                                                {cat.category}
                                            </button>
                                        ))}
                                        <div className="w-px h-6 bg-gray-200 mx-1 flex-shrink-0"></div>
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="flex-shrink-0 px-4 py-2 text-blue-600 text-sm font-bold hover:bg-blue-50 rounded-xl transition-colors flex items-center">
                                            <Icons.Plus className="w-4 h-4 mr-1 border-2 border-current rounded-full" /> 新增
                                        </button>
                                    </div>

                                    {/* 卡組標題與刪除按鈕 */}
                                    <div className="flex justify-between items-center mb-4 px-2">
                                        <span className="font-bold text-gray-800 text-xl">{currentCategory.category}</span>
                                        <button onClick={() => setModalState({ isOpen: true, type: 'deleteDeck' })} className="text-gray-400 text-sm hover:text-red-500 hover:bg-red-50 flex items-center px-3 py-1.5 rounded-lg transition-colors font-medium">
                                            <Icons.Trash2 className="w-4 h-4 mr-1.5" /> 刪除卡組
                                        </button>
                                    </div>

                                    {/* 字卡主體 */}
                                    <div className="aspect-[4/3] md:aspect-[16/10] perspective-1000 mb-8">
                                        {totalCards === 0 ? (
                                            <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed border-gray-300 flex items-center justify-center flex-col shadow-sm">
                                                {showStarredOnly ? (
                                                    <React.Fragment>
                                                        <Icons.Star className="w-12 h-12 text-yellow-400 mb-3" fill="currentColor" />
                                                        <span className="text-gray-500 font-bold mb-4">這個卡組目前沒有被標記星星的卡片喔！</span>
                                                        <button onClick={() => setShowStarredOnly(false)} className="text-blue-600 font-bold hover:bg-blue-50 px-6 py-2 rounded-full transition-colors flex items-center border border-blue-200">
                                                            返回全部卡片
                                                        </button>
                                                    </React.Fragment>
                                                ) : (
                                                    <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="text-blue-600 font-bold hover:bg-blue-50 px-6 py-3 rounded-full transition-colors flex items-center">
                                                        <Icons.Plus className="w-5 h-5 mr-1" /> 新增第一張字卡
                                                    </button>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="relative w-full h-full preserve-3d cursor-pointer" style={{ transform: `rotateY(${flipAngle}deg)`, transition: 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }} onClick={handleFlip}>
                                                
                                                {/* DOM Front */}
                                                <div className={`absolute w-full h-full backface-hidden rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border-t-[6px] text-center overflow-y-auto custom-scrollbar ${frontTheme.bg} ${frontTheme.border}`}>
                                                    <div className={`absolute top-5 left-6 text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider ${frontTheme.badgeText} ${frontTheme.badgeBg}`}>
                                                        {domFrontFace?.label}
                                                    </div>
                                                    
                                                    <button onClick={handleToggleStar} className={`absolute top-5 right-14 p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400 hover:bg-yellow-100' : frontTheme.iconClass}`} title="標記星號 (重點複習)">
                                                        <Icons.Star className="w-6 h-6" fill={currentCard?.isStarred ? "currentColor" : "none"} />
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' }); }} className={`absolute top-5 right-5 p-2 rounded-full transition-colors ${frontTheme.trashClass}`} title="刪除此卡">
                                                        <Icons.Trash2 className="w-5 h-5" />
                                                    </button>

                                                    <div className={`text-3xl md:text-4xl font-bold whitespace-pre-wrap leading-relaxed w-full px-4 mt-6 ${frontTheme.text}`}>
                                                        {domFrontFace?.text}
                                                    </div>
                                                    <div className={`absolute bottom-5 text-xs flex items-center font-bold px-3 py-1 rounded-full ${frontTheme.badgeText} ${frontTheme.badgeBg}`}>
                                                        點擊翻轉 <Icons.RotateCcw className="w-3 h-3 ml-1.5" />
                                                    </div>
                                                </div>
                                                
                                                {/* DOM Back */}
                                                <div className={`absolute w-full h-full backface-hidden rotate-y-180 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 border-t-[6px] text-center overflow-y-auto custom-scrollbar ${backTheme.bg} ${backTheme.border}`}>
                                                    <div className={`absolute top-5 left-6 text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider ${backTheme.badgeText} ${backTheme.badgeBg}`}>
                                                        {domBackFace?.label}
                                                    </div>
                                                    
                                                    <button onClick={handleToggleStar} className={`absolute top-5 right-14 p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400 hover:bg-yellow-100' : backTheme.iconClass}`} title="標記星號 (重點複習)">
                                                        <Icons.Star className="w-6 h-6" fill={currentCard?.isStarred ? "currentColor" : "none"} />
                                                    </button>
                                                    <button onClick={(e) => { e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' }); }} className={`absolute top-5 right-5 p-2 rounded-full transition-colors ${backTheme.trashClass}`} title="刪除此卡">
                                                        <Icons.Trash2 className="w-5 h-5" />
                                                    </button>

                                                    <div className={`text-3xl md:text-4xl font-bold whitespace-pre-wrap leading-relaxed w-full px-4 mt-6 ${backTheme.text}`}>
                                                        {domBackFace?.text}
                                                    </div>
                                                    <div className={`absolute bottom-5 text-xs flex items-center font-bold px-3 py-1 rounded-full ${backTheme.badgeText} ${backTheme.badgeBg}`}>
                                                        點擊翻轉 <Icons.RotateCcw className="w-3 h-3 ml-1.5" />
                                                    </div>
                                                </div>

                                            </div>
                                        )}
                                    </div>

                                    {/* 控制列與進度列 [cite: 157] */}
                                    <div className="flex flex-col md:flex-row items-center justify-between gap-6 bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                                        <div className="flex items-center gap-3 w-full md:w-auto">
                                            <div className="text-gray-500 text-sm font-bold bg-gray-100 px-4 py-3 rounded-2xl whitespace-nowrap">
                                                {totalCards > 0 ? currentCardIndex + 1 : 0} / {totalCards}
                                            </div>
                                            {allCards.length > 0 && (
                                                <button onClick={() => {setShowStarredOnly(!showStarredOnly); setCurrentCardIndex(0); setFlipAngle(0);}} className={`text-sm font-bold px-4 py-3 rounded-2xl transition-colors flex items-center justify-center flex-1 md:flex-none ${showStarredOnly ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                                                    <Icons.Star className="w-4 h-4 mr-1.5" fill={showStarredOnly ? "currentColor" : "none"} /> 
                                                    {showStarredOnly ? '查看全部' : '只看星號'}
                                                </button>
                                            )}
                                        </div>

                                        <div className="flex items-center gap-2">
                                            <button onClick={handleFirstCard} disabled={totalCards <= 1 || currentCardIndex === 0} className="w-12 h-12 bg-gray-50 text-gray-600 rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-200 transition-colors" title="回到第一張"><Icons.SkipBack className="w-5 h-5"/></button>
                                            <button onClick={handlePrev} disabled={totalCards <= 1} className="w-12 h-12 bg-gray-50 text-gray-600 rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-200 transition-colors" title="上一張"><Icons.ChevronLeft className="w-6 h-6"/></button>
                                            
                                            <div className="flex gap-2 px-2">
                                                <button onClick={handleShuffle} disabled={totalCards <= 1} className="px-5 py-3 bg-gray-800 text-white rounded-full text-sm font-bold disabled:opacity-30 hover:bg-gray-900 transition-colors shadow-md flex items-center"><Icons.Shuffle className="w-4 h-4 mr-1" />打亂</button>
                                                <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="px-5 py-3 bg-blue-600 text-white rounded-full text-sm font-bold hover:bg-blue-700 transition-colors shadow-md flex items-center"><Icons.Plus className="w-4 h-4 mr-1 border-2 border-current rounded-full" />新增</button>
                                            </div>
                                            
                                            <button onClick={handleNext} disabled={totalCards <= 1} className="w-12 h-12 bg-gray-50 text-gray-600 rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-200 transition-colors" title="下一張"><Icons.ChevronRight className="w-6 h-6"/></button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 所有彈出視窗模組 [cite: 172] */}
                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center z-50 p-4 animate-[fadeIn_0.2s]">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 relative">
                                <button onClick={closeModal} className="absolute top-6 right-6 text-gray-400 hover:bg-gray-100 p-2 rounded-full transition-colors"><Icons.X className="w-5 h-5" /></button>
                                
                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6 text-gray-800">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-6 focus:border-blue-500 focus:bg-white outline-none transition-colors" placeholder="輸入卡組名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleAddDeck()} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-colors shadow-lg">確認建立</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6 text-gray-800">快速匯入文字</h3>
                                        
                                        {decks.length > 0 && (
                                            <div className="flex gap-6 mb-6 bg-gray-50 p-4 rounded-2xl">
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="importMode" checked={formData.importMode === 'append'} onChange={() => setFormData({...formData, importMode: 'append'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                    <span className="text-sm font-bold text-gray-700">加入「{currentCategory?.category}」</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="importMode" checked={formData.importMode === 'new'} onChange={() => setFormData({...formData, importMode: 'new'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                    <span className="text-sm font-bold text-gray-700">建立新卡組</span>
                                                </label>
                                            </div>
                                        )}

                                        {(decks.length === 0 || formData.importMode === 'new') && (
                                            <input autoFocus type="text" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-4 focus:border-blue-500 focus:bg-white outline-none text-sm transition-colors" placeholder="輸入新卡組名稱 (未輸入預設為：新匯入卡組)" value={formData.newDeckName} onChange={e => setFormData({...formData, newDeckName: e.target.value})} />
                                        )}
                                        
                                        <textarea 
                                            rows="6" 
                                            className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-6 text-sm focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" 
                                            placeholder={"格式一(雙面)：\n【正面】：Apple\n【背面】：蘋果\n\n格式二(三面)：\n【正面】：第一面內容\n【中間】：第二面內容\n【背面】：第三面內容"} 
                                            value={formData.importText} 
                                            onChange={e => setFormData({...formData, importText: e.target.value})}
                                        ></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-gray-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition-colors shadow-lg">解析並同步至雲端</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 text-gray-800">新增字卡</h3>
                                        
                                        {/* 字卡模式切換 */}
                                        <div className="flex gap-4 mb-5 bg-gray-50 p-3 rounded-2xl">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={formData.cardType === '2sided'} onChange={() => setFormData({...formData, cardType: '2sided'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                <span className="text-sm font-bold text-gray-700">雙面字卡</span>
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={formData.cardType === '3sided'} onChange={() => setFormData({...formData, cardType: '3sided'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                <span className="text-sm font-bold text-gray-700">三面字卡</span>
                                            </label>
                                        </div>

                                        {formData.cardType === '3sided' ? (
                                            <React.Fragment>
                                                <textarea autoFocus rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-3 rounded-xl mb-3 focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" placeholder="正面內容" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                                <textarea rows="2" className="w-full border-2 border-gray-100 bg-emerald-50 p-3 rounded-xl mb-3 focus:border-emerald-500 focus:bg-white outline-none resize-none transition-colors" placeholder="中間內容" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>
                                                <textarea rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-3 rounded-xl mb-5 focus:border-yellow-400 focus:bg-white outline-none resize-none transition-colors" placeholder="背面內容" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                            </React.Fragment>
                                        ) : (
                                            <React.Fragment>
                                                <textarea autoFocus rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-4 focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" placeholder="正面內容 (單字/題目)" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                                <textarea rows="3" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-6 focus:border-yellow-400 focus:bg-white outline-none resize-none transition-colors" placeholder="背面內容 (翻譯/解答)" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                            </React.Fragment>
                                        )}
                                        
                                        <button onClick={handleAddCard} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-colors shadow-lg">儲存並同步</button>
                                    </div>
                                )}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center pt-4">
                                        <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500">
                                            <Icons.Trash2 className="w-10 h-10" />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 text-gray-800">確定要刪除嗎？</h3>
                                        <p className="text-gray-500 mb-8 font-medium">刪除後雲端資料也將同步移除，操作無法復原。</p>
                                        <div className="flex gap-4">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-colors">取消</button>
                                            <button onClick={modalState.type === 'deleteDeck' ? handleDeleteDeck : handleDeleteCard} className="flex-1 bg-red-500 text-white font-bold py-4 rounded-2xl hover:bg-red-600 transition-colors shadow-lg">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />); [cite: 212]
    </script>
</body>
</html>
