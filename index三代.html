<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const Icons = {
            PlusCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-16 h-16 text-blue-300 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            Star: ({className, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
            Shuffle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        };

        const App = () => {
            const [decks, setDecks] = React.useState(() => {
                try {
                    const savedDecks = localStorage.getItem('myCustomFlashcards_v4');
                    return savedDecks ? JSON.parse(savedDecks) : [];
                } catch (e) {
                    return [];
                }
            });

            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            const [isFlipped, setIsFlipped] = React.useState(false);
            const [showStarredOnly, setShowStarredOnly] = React.useState(false); 
            const [modalState, setModalState] = React.useState({ isOpen: false, type: null }); 
            const [formData, setFormData] = React.useState({ deckName: '', cardFront: '', cardBack: '', importText: '', importMode: 'append', newDeckName: '' });
            
            const fileInputRef = React.useRef(null);
            
            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            
            // 將原始索引記錄下來，以便過濾星號卡片後還能找到正確的卡片進行刪除或修改
            const currentCardsWithIdx = allCards.map((c, idx) => ({ ...c, originalIndex: idx }));
            const currentCards = showStarredOnly ? currentCardsWithIdx.filter(c => c.isStarred) : currentCardsWithIdx;
            
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;

            React.useEffect(() => {
                localStorage.setItem('myCustomFlashcards_v4', JSON.stringify(decks));
            }, [decks]);

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (modalState.isOpen) return;
                    if (e.key === 'ArrowRight') handleNext();
                    else if (e.key === 'ArrowLeft') handlePrev();
                    else if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault(); 
                        handleFlip();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentCardIndex, isFlipped, totalCards, modalState.isOpen, activeCategoryIndex, decks, showStarredOnly]);

            const handleExport = () => {
                if (decks.length === 0) return;
                const dataStr = JSON.stringify(decks, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `flashcards_backup.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm("確定要覆蓋目前資料嗎？")) {
                                setDecks(importedData);
                                setActiveCategoryIndex(0);
                                setCurrentCardIndex(0);
                                setShowStarredOnly(false);
                            }
                        }
                    } catch (error) {
                        alert("讀取失敗");
                    }
                };
                reader.readAsText(file);
            };

            const handleTextImport = () => {
                if (!formData.importText.trim()) return;
                const cards = [];
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                blocks.forEach(block => {
                    const parts = block.split(/【背面】(?:：|:)?/);
                    if (parts.length >= 2) {
                        cards.push({ front: parts[0].trim(), back: parts.slice(1).join('【背面】：').trim(), isStarred: false });
                    }
                });
                
                if (cards.length === 0) {
                    alert("找不到符合格式的字卡，請確認是否包含「【正面】：」與「【背面】：」");
                    return;
                }

                if (decks.length === 0 || formData.importMode === 'new') {
                    const newName = formData.newDeckName.trim() || "新匯入卡組";
                    const newDeck = { category: newName, cards: cards };
                    setDecks([...decks, newDeck]);
                    setActiveCategoryIndex(decks.length);
                    setCurrentCardIndex(0);
                    setShowStarredOnly(false);
                } else {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards = [
                        ...newDecks[activeCategoryIndex].cards,
                        ...cards
                    ];
                    setDecks(newDecks);
                }
                
                closeModal();
                setTimeout(() => alert(`🎉 成功匯入 ${cards.length} 張字卡！`), 100);
            };

            const handleFlip = () => totalCards > 0 && setIsFlipped(!isFlipped);

            const handleFirstCard = () => {
                if (totalCards <= 1 || currentCardIndex === 0) return;
                setIsFlipped(false);
                setCurrentCardIndex(0);
            };

            const handleNext = React.useCallback(() => {
                if (totalCards <= 1) return;
                setIsFlipped(false);
                setTimeout(() => setCurrentCardIndex((prev) => (prev + 1) % totalCards), 150);
            }, [totalCards]);

            const handlePrev = React.useCallback(() => {
                if (totalCards <= 1) return;
                setIsFlipped(false);
                setTimeout(() => setCurrentCardIndex((prev) => (prev - 1 + totalCards) % totalCards), 150);
            }, [totalCards]);

            const handleShuffle = () => {
                if (totalCards <= 1) return;
                setIsFlipped(false);
                const newDecks = [...decks];
                // 為了不影響「只看星號」模式的過濾，我們直接把該卡組的所有卡片打亂
                newDecks[activeCategoryIndex].cards.sort(() => Math.random() - 0.5);
                setDecks(newDecks);
                setCurrentCardIndex(0);
            };

            const handleToggleStar = (e) => {
                e.stopPropagation();
                if (!currentCard) return;
                const newDecks = [...decks];
                const originalIdx = currentCard.originalIndex;
                const currentStatus = newDecks[activeCategoryIndex].cards[originalIdx].isStarred;
                newDecks[activeCategoryIndex].cards[originalIdx].isStarred = !currentStatus;
                setDecks(newDecks);

                // 如果在「只看星號」模式下取消星號，卡片會消失，需要調整索引
                if (showStarredOnly && currentStatus === true) {
                    if (currentCardIndex >= currentCards.length - 1) {
                        setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                    }
                }
            };

            const handleAddDeck = () => {
                if (!formData.deckName.trim()) return;
                setDecks([...decks, { category: formData.deckName, cards: [] }]);
                setActiveCategoryIndex(decks.length);
                setCurrentCardIndex(0);
                setShowStarredOnly(false);
                closeModal();
            };

            const handleAddCard = () => {
                if (!formData.cardFront.trim() || !formData.cardBack.trim()) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.push({ front: formData.cardFront, back: formData.cardBack, isStarred: false });
                setDecks(newDecks);
                if (showStarredOnly) setShowStarredOnly(false); // 關閉星號模式以便看到剛新增的卡片
                setCurrentCardIndex(newDecks[activeCategoryIndex].cards.length - 1);
                closeModal();
            };

            const handleDeleteDeck = () => {
                const newDecks = decks.filter((_, idx) => idx !== activeCategoryIndex);
                setDecks(newDecks);
                setActiveCategoryIndex(Math.max(0, activeCategoryIndex - 1));
                setCurrentCardIndex(0);
                setShowStarredOnly(false);
                closeModal();
            };

            const handleDeleteCard = () => {
                const newDecks = [...decks];
                // 必須使用 originalIndex 刪除，避免在星號模式下刪除錯誤的卡片
                newDecks[activeCategoryIndex].cards.splice(currentCard.originalIndex, 1);
                setDecks(newDecks);
                setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                closeModal();
            };

            const closeModal = () => {
                setModalState({ isOpen: false, type: null });
                setFormData({ deckName: '', cardFront: '', cardBack: '', importText: '', importMode: 'append', newDeckName: '' });
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
                    `}</style>

                    <div className="w-full max-w-4xl text-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800 mb-6">苗寶字卡系統</h1>
                        <div className="flex flex-wrap justify-center gap-3">
                            <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm">
                                <Icons.FileText className="w-4 h-4 mr-2" /> 快速匯入文字
                            </button>
                            <button onClick={() => fileInputRef.current.click()} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm">
                                <Icons.Upload className="w-4 h-4 mr-2" /> 匯入備份
                            </button>
                            <button onClick={handleExport} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm">
                                <Icons.Download className="w-4 h-4 mr-2" /> 匯出備份
                            </button>
                            <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                        </div>
                    </div>

                    {decks.length === 0 ? (
                        <div className="w-full max-w-2xl bg-white p-10 rounded-3xl border-2 border-dashed text-center">
                            <Icons.PlusCircle />
                            <h2 className="text-xl font-bold text-gray-700 mb-4">尚未建立卡組</h2>
                            <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700">建立新卡組</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-2xl">
                            <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-xl mb-6 border gap-2 items-center">
                                {decks.map((cat, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => { setActiveCategoryIndex(i); setCurrentCardIndex(0); setIsFlipped(false); setShowStarredOnly(false); }} 
                                        className={`flex-shrink-0 px-4 py-2 rounded-lg text-sm whitespace-nowrap transition-all ${activeCategoryIndex === i ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:bg-gray-100'}`}
                                    >
                                        {cat.category}
                                    </button>
                                ))}
                                <div className="w-px h-6 bg-gray-200 mx-1 flex-shrink-0"></div>
                                <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} className="flex-shrink-0 px-4 py-2 text-blue-600 text-sm font-bold hover:bg-blue-50 rounded-lg transition-colors flex items-center">
                                    <Icons.Plus className="w-4 h-4 mr-1" /> 新增卡組
                                </button>
                            </div>

                            <div className="flex justify-between items-center mb-4 px-2">
                                <span className="font-bold text-gray-700 text-lg">{currentCategory.category}</span>
                                <button onClick={() => setModalState({ isOpen: true, type: 'deleteDeck' })} className="text-red-400 text-sm hover:text-red-600 flex items-center px-2 py-1 rounded hover:bg-red-50">
                                    <Icons.Trash2 className="w-4 h-4 mr-1" /> 刪除卡組
                                </button>
                            </div>

                            <div className="aspect-[4/3] md:aspect-[16/9] [perspective:1000px] mb-8">
                                {totalCards === 0 ? (
                                    <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed flex items-center justify-center flex-col">
                                        {showStarredOnly ? (
                                            <React.Fragment>
                                                <Icons.Star className="w-12 h-12 text-yellow-300 mb-2" fill="currentColor" />
                                                <span className="text-gray-500 font-medium mb-4">目前沒有被標記星星的卡片喔！</span>
                                                <button onClick={() => setShowStarredOnly(false)} className="text-indigo-600 font-bold hover:bg-indigo-50 px-6 py-3 rounded-full transition-colors flex items-center border border-indigo-200">
                                                    返回全部卡片
                                                </button>
                                            </React.Fragment>
                                        ) : (
                                            <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="text-indigo-600 font-bold hover:bg-indigo-50 px-6 py-3 rounded-full transition-colors flex items-center">
                                                <Icons.Plus className="w-5 h-5 mr-1" /> 新增字卡
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className={`relative w-full h-full transition-transform duration-500 [transform-style:preserve-3d] cursor-pointer ${isFlipped ? '[transform:rotateY(180deg)]' : ''}`} onClick={handleFlip}>
                                        <div className="absolute w-full h-full [backface-visibility:hidden] bg-white rounded-3xl shadow-lg flex flex-col items-center justify-center p-8 border-t-4 border-blue-500 text-center hover:shadow-xl transition-shadow overflow-y-auto custom-scrollbar">
                                            <div className="absolute top-4 left-6 text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">正面</div>
                                            
                                            <button onClick={handleToggleStar} className={`absolute top-4 right-14 p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400 hover:text-yellow-500 hover:bg-yellow-50' : 'text-gray-300 hover:text-yellow-400 hover:bg-gray-50'}`} title="標記星號 (重點複習)">
                                                <Icons.Star className="w-5 h-5" fill={currentCard?.isStarred ? "currentColor" : "none"} />
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' }); }} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-full transition-colors" title="刪除此卡">
                                                <Icons.Trash2 className="w-5 h-5" />
                                            </button>

                                            <div className="text-2xl md:text-3xl text-gray-800 whitespace-pre-wrap leading-relaxed w-full px-4 mt-6">{currentCard?.front}</div>
                                            <div className="absolute bottom-4 text-gray-400 text-xs flex items-center">點擊翻轉 <Icons.RotateCcw className="w-3 h-3 ml-1" /></div>
                                        </div>
                                        <div className="absolute w-full h-full [backface-visibility:hidden] [transform:rotateY(180deg)] bg-blue-50 rounded-3xl shadow-lg flex flex-col items-center justify-center p-8 border-t-4 border-red-500 text-center overflow-y-auto custom-scrollbar">
                                            <div className="absolute top-4 left-6 text-xs font-bold text-red-500 bg-red-100 px-3 py-1 rounded-full">背面</div>
                                            
                                            <button onClick={handleToggleStar} className={`absolute top-4 right-14 p-2 rounded-full transition-colors ${currentCard?.isStarred ? 'text-yellow-400 hover:text-yellow-500 hover:bg-yellow-50' : 'text-gray-300 hover:text-yellow-400 hover:bg-gray-50'}`} title="標記星號 (重點複習)">
                                                <Icons.Star className="w-5 h-5" fill={currentCard?.isStarred ? "currentColor" : "none"} />
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); setModalState({ isOpen: true, type: 'deleteCard' }); }} className="absolute top-4 right-4 text-gray-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-full transition-colors" title="刪除此卡">
                                                <Icons.Trash2 className="w-5 h-5" />
                                            </button>

                                            <div className="text-xl md:text-2xl text-gray-800 font-bold whitespace-pre-wrap leading-relaxed w-full px-4 mt-6">{currentCard?.back}</div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                                <div className="flex flex-col gap-2 items-center md:items-start w-full md:w-auto">
                                    <div className="text-gray-500 text-sm font-medium bg-white px-4 py-2 rounded-xl border flex items-center justify-center w-full md:w-auto">
                                        進度: {totalCards > 0 ? currentCardIndex + 1 : 0} / {totalCards}
                                    </div>
                                    {allCards.length > 0 && (
                                        <button onClick={() => {setShowStarredOnly(!showStarredOnly); setCurrentCardIndex(0); setIsFlipped(false);}} className={`text-sm font-medium px-4 py-2 rounded-xl border transition-colors flex items-center justify-center w-full md:w-auto ${showStarredOnly ? 'bg-yellow-100 border-yellow-400 text-yellow-700 shadow-sm' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>
                                            <Icons.Star className="w-4 h-4 mr-1" fill={showStarredOnly ? "currentColor" : "none"} /> 
                                            {showStarredOnly ? '查看全部' : '重點複習 (只看星號)'}
                                        </button>
                                    )}
                                </div>

                                <div className="flex space-x-2 md:space-x-3 items-center">
                                    <button onClick={handleFirstCard} disabled={totalCards <= 1 || currentCardIndex === 0} className="w-10 h-10 md:w-12 md:h-12 bg-white border rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-50 transition-colors" title="回到第一張"><Icons.SkipBack className="w-4 h-4 md:w-5 md:h-5"/></button>
                                    <button onClick={handlePrev} disabled={totalCards <= 1} className="w-10 h-10 md:w-12 md:h-12 bg-white border rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-50 transition-colors" title="上一張"><Icons.ChevronLeft className="w-5 h-5 md:w-6 md:h-6"/></button>
                                    
                                    <button onClick={handleShuffle} disabled={totalCards <= 1} className="px-3 md:px-5 py-2 bg-gray-800 text-white rounded-full text-xs md:text-sm disabled:opacity-30 hover:bg-gray-900 transition-colors font-bold whitespace-nowrap shadow-sm">打亂</button>
                                    <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} className="px-3 md:px-5 py-2 bg-indigo-600 text-white rounded-full text-xs md:text-sm hover:bg-indigo-700 transition-colors font-bold whitespace-nowrap shadow-sm">新增</button>
                                    
                                    <button onClick={handleNext} disabled={totalCards <= 1} className="w-10 h-10 md:w-12 md:h-12 bg-white border rounded-full flex items-center justify-center disabled:opacity-30 hover:bg-gray-50 transition-colors" title="下一張"><Icons.ChevronRight className="w-5 h-5 md:w-6 md:h-6"/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {modalState.isOpen && (
                        <div className="fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative animate-[fadeIn_0.2s]">
                                <button onClick={closeModal} className="absolute top-4 right-4 text-gray-400 hover:bg-gray-100 p-1 rounded-full transition-colors"><Icons.X className="w-6 h-6" /></button>
                                
                                {modalState.type === 'addDeck' && (
                                    <div>
                                        <h3 className="text-lg font-bold mb-4 text-gray-800">建立新卡組</h3>
                                        <input autoFocus type="text" className="w-full border p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="輸入卡組名稱" value={formData.deckName} onChange={e => setFormData({...formData, deckName: e.target.value})} onKeyDown={e => e.key === 'Enter' && handleAddDeck()} />
                                        <button onClick={handleAddDeck} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">建立</button>
                                    </div>
                                )}

                                {modalState.type === 'importText' && (
                                    <div>
                                        <h3 className="text-lg font-bold mb-4 text-gray-800">快速匯入文字</h3>
                                        
                                        {decks.length > 0 && (
                                            <div className="flex gap-4 mb-4">
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="importMode" checked={formData.importMode === 'append'} onChange={() => setFormData({...formData, importMode: 'append'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                    <span className="text-sm font-medium text-gray-700">加入至「{currentCategory?.category}」</span>
                                                </label>
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="radio" name="importMode" checked={formData.importMode === 'new'} onChange={() => setFormData({...formData, importMode: 'new'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                    <span className="text-sm font-medium text-gray-700">建立新卡組</span>
                                                </label>
                                            </div>
                                        )}

                                        {(decks.length === 0 || formData.importMode === 'new') && (
                                            <input autoFocus type="text" className="w-full border p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="輸入新卡組名稱 (如未輸入預設為：新匯入卡組)" value={formData.newDeckName} onChange={e => setFormData({...formData, newDeckName: e.target.value})} />
                                        )}
                                        
                                        <textarea rows="6" className="w-full border p-3 rounded-xl mb-4 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" placeholder="請貼上文字，格式範例：&#10;【正面】：Apple&#10;【背面】：蘋果&#10;&#10;【正面】：Banana&#10;【背面】：香蕉" value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})}></textarea>
                                        <button onClick={handleTextImport} className="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition-colors">解析並匯入字卡</button>
                                    </div>
                                )}

                                {modalState.type === 'addCard' && (
                                    <div>
                                        <h3 className="text-lg font-bold mb-4 text-gray-800">新增字卡</h3>
                                        <textarea autoFocus rows="2" className="w-full border p-3 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="正面內容" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                        <textarea rows="3" className="w-full border p-3 rounded-xl mb-4 focus:ring-2 focus:ring-red-500 outline-none resize-none" placeholder="背面內容" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                        <button onClick={handleAddCard} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">儲存</button>
                                    </div>
                                )}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center">
                                        <Icons.Trash2 className="w-12 h-12 text-red-500 mx-auto mb-4" />
                                        <h3 className="text-lg font-bold mb-6 text-gray-800">確定要刪除嗎？操作無法復原。</h3>
                                        <div className="flex space-x-3">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200 transition-colors">取消</button>
                                            <button onClick={modalState.type === 'deleteDeck' ? handleDeleteDeck : handleDeleteCard} className="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition-colors">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
