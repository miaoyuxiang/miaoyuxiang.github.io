<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗寶雲端字卡系統 (前後端分離安全版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        // 🚨 注意：這裡已經完全移除了 Firestore 的匯入，只保留 Auth 登入功能
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase 基礎設定 (保留，用於驗證登入身分)
        const firebaseConfig = {
            apiKey: "AIzaSyBMqOn8ihqPxWP7L1rKMMH07t8Y8QSX_Zs",
            authDomain: "miaocard.firebaseapp.com",
            projectId: "miaocard",
            storageBucket: "miaocard.firebasestorage.app",
            messagingSenderId: "39206538337",
            appId: "1:39206538337:web:8b1712d916038e4ce6ae20",
            measurementId: "G-5V0PWWG70Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        setPersistence(auth, browserLocalPersistence).catch(console.error);

        // 🔗 你的本地後端伺服器網址
        const BACKEND_URL = "http://localhost:5000";

        // 圖示庫 (維持原樣)
        const Icons = {
            PlusCircle: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className || "w-16 h-16 text-blue-300 mx-auto mb-4"} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            Plus: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            X: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            RotateCcw: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
            ChevronLeft: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            SkipBack: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>,
            List: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Shuffle: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>,
            Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            FileText: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Cloud: ({className, style}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.77-2.053-5.06-4.73-5.412C17.343 4.316 14.113 1.5 10 1.5 6.012 1.5 2.71 3.99 1.63 7.428 0.7 8.24 0 9.54 0 11c0 2.21 1.79 4 4 4h13.5"/></svg>,
            Volume2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
            Star: ({className, filled}) => <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [decks, setDecks] = React.useState([]);
            const [activeCategoryIndex, setActiveCategoryIndex] = React.useState(0);
            const [currentCardIndex, setCurrentCardIndex] = React.useState(0);
            
            const [filterStatus, setFilterStatus] = React.useState('all'); 
            const [flipOrder, setFlipOrder] = React.useState('FMB');
            const [selectedCards, setSelectedCards] = React.useState(new Set()); 
            
            const [buttonColor, setButtonColor] = React.useState('#EBE6E0'); 
            const [cardTextColor, setCardTextColor] = React.useState('#333333'); 
            const [cardTextSize, setCardTextSize] = React.useState('36'); 
            const [showNote, setShowNote] = React.useState(false); 
            
            const [flipAngle, setFlipAngle] = React.useState(0);
            const [swipeOffset, setSwipeOffset] = React.useState(0);
            const [swipeOut, setSwipeOut] = React.useState(null); 
            const [resetMode, setResetMode] = React.useState(false); 
            const [isDragging, setIsDragging] = React.useState(false);
            
            const touchStartX = React.useRef(null);
            const currentSwipe = React.useRef(0); 
            const isSwiping = React.useRef(false);
            const flipLock = React.useRef(false); 

            const [modalState, setModalState] = React.useState({ isOpen: false, type: null });
            const [formData, setFormData] = React.useState({ deckName: '', deckColor: '#503422', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', importMode: 'append', newDeckName: '', cardType: '2sided', editIndex: null });
            
            const fileInputRef = React.useRef(null);
            
            const modalRef = React.useRef(modalState);
            React.useEffect(() => {
                modalRef.current = modalState;
            }, [modalState]);
            
            // 登入狀態監聽
            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser) {
                        localStorage.removeItem('miaocard_is_guest');
                        setUser(currentUser);
                    } else {
                        const isGuest = localStorage.getItem('miaocard_is_guest') === 'true';
                        if (isGuest) {
                            handleGuestLogin();
                        } else {
                            setUser(null);
                        }
                    }
                });
                return () => unsubscribe();
            }, []);

            // 🌟 核心修改 1：向後端 API 讀取資料
            React.useEffect(() => {
                if (!user) return;
                
                if (user.isGuest) {
                    // 訪客模式維持讀取 LocalStorage
                    const localData = localStorage.getItem('miaocard_guest_data');
                    if (localData) {
                        try {
                            const data = JSON.parse(localData);
                            setDecks(data.decks || []);
                            if (data.settings && modalRef.current.type !== 'settings') {
                                setButtonColor(data.settings.buttonColor || '#EBE6E0');
                                setCardTextColor(data.settings.cardTextColor || '#333333');
                                setCardTextSize(data.settings.cardTextSize || '36');
                            }
                        } catch (e) {
                            console.error("解析本地資料失敗", e);
                        }
                    } else {
                        setDecks([]);
                    }
                    return;
                }

                // 正式會員：向 Node.js 後端要資料
                const fetchDataFromBackend = async () => {
                    try {
                        const token = await user.getIdToken();
                        const response = await fetch(`${BACKEND_URL}/api/decks`, {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            setDecks(data.decks || []);
                            if (data.settings && modalRef.current.type !== 'settings') {
                                setButtonColor(data.settings.buttonColor || '#EBE6E0');
                                setCardTextColor(data.settings.cardTextColor || '#333333');
                                setCardTextSize(data.settings.cardTextSize || '36');
                            }
                        }
                    } catch (error) {
                        console.error("從後端讀取資料失敗", error);
                    }
                };

                fetchDataFromBackend();
            }, [user]);

            // 🌟 核心修改 2：將資料同步至後端 API
            const syncToCloud = async (newDecks, newSettings = null) => {
                if (!user) return;
                
                if (user.isGuest) {
                    const currentData = JSON.parse(localStorage.getItem('miaocard_guest_data') || '{}');
                    currentData.decks = newDecks;
                    if (newSettings) currentData.settings = newSettings;
                    localStorage.setItem('miaocard_guest_data', JSON.stringify(currentData));
                    return;
                }
                
                // 正式會員：打包資料並 POST 給後端
                try {
                    const token = await user.getIdToken();
                    const payload = { decks: newDecks };
                    if (newSettings) payload.settings = newSettings;

                    await fetch(`${BACKEND_URL}/api/decks`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                } catch (error) {
                    console.error("同步至後端失敗", error);
                }
            };

            const updateDecks = (newDecks) => {
                setDecks(newDecks);
                syncToCloud(newDecks);
            };

            const handleLogin = () => {
                setPersistence(auth, browserLocalPersistence)
                    .then(() => signInWithPopup(auth, provider))
                    .catch(console.error);
            };
            
            const handleGuestLogin = () => {
                localStorage.setItem('miaocard_is_guest', 'true');
                setUser({ 
                    uid: 'guest', 
                    isGuest: true, 
                    displayName: '訪客模式 (單機儲存)', 
                    photoURL: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%239CA3AF'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" 
                });
            };

            const handleLogout = () => {
                if (user?.isGuest) {
                    localStorage.removeItem('miaocard_is_guest');
                    setUser(null);
                    setDecks([]);
                } else {
                    signOut(auth).then(() => {
                        setUser(null);
                        setDecks([]);
                    });
                }
            };

            const currentCategory = decks[activeCategoryIndex] || null;
            const allCards = currentCategory?.cards || [];
            
            const currentCardsWithIdx = allCards.map((c, idx) => {
                let status = c.status;
                if (!status) status = c.isStarred ? 'mastered' : 'unrated';
                return { ...c, status, originalIndex: idx };
            });

            const currentCards = filterStatus === 'all' 
                ? currentCardsWithIdx 
                : filterStatus === 'starred'
                    ? currentCardsWithIdx.filter(c => c.isStarred)
                    : currentCardsWithIdx.filter(c => c.status === filterStatus);
            
            const currentCard = currentCards[currentCardIndex] || null;
            const totalCards = currentCards.length;

            const triggerNext = React.useCallback(() => {
                if (totalCards <= 1 || swipeOut || flipLock.current) return;
                setSwipeOut('left'); 
                setTimeout(() => {
                    setResetMode(true); 
                    setFlipAngle(0);    
                    setSwipeOffset(0);  
                    setSwipeOut(null);
                    setCurrentCardIndex((prev) => (prev + 1) % totalCards); 
                    setTimeout(() => setResetMode(false), 50); 
                }, 300);
            }, [totalCards, swipeOut]);

            const triggerPrev = React.useCallback(() => {
                if (totalCards <= 1 || swipeOut || flipLock.current) return;
                setSwipeOut('right'); 
                setTimeout(() => {
                    setResetMode(true);
                    setFlipAngle(0);    
                    setSwipeOffset(0);  
                    setSwipeOut(null);
                    setCurrentCardIndex((prev) => (prev - 1 + totalCards) % totalCards); 
                    setTimeout(() => setResetMode(false), 50);
                }, 300);
            }, [totalCards, swipeOut]);

            const onTouchStart = (e) => {
                touchStartX.current = e.targetTouches[0].clientX;
                currentSwipe.current = 0;
                isSwiping.current = false;
                setIsDragging(true);
            };

            const onTouchMove = (e) => {
                if (!isDragging || touchStartX.current === null) return;
                const currentX = e.targetTouches[0].clientX;
                const diff = currentX - touchStartX.current;
                currentSwipe.current = diff;
                setSwipeOffset(diff);
                if (Math.abs(diff) > 5) {
                    isSwiping.current = true;
                }
            };

            const onTouchEnd = () => {
                if (!isDragging) return;
                setIsDragging(false);
                if (currentSwipe.current > 80) triggerPrev(); 
                else if (currentSwipe.current < -80) triggerNext(); 
                else setSwipeOffset(0); 
                touchStartX.current = null;
                currentSwipe.current = 0;
            };

            const onMouseDown = (e) => {
                if (e.button !== 0) return; 
                touchStartX.current = e.clientX;
                currentSwipe.current = 0;
                isSwiping.current = false;
                setIsDragging(true);
            };

            const onMouseMove = (e) => {
                if (!isDragging || touchStartX.current === null) return;
                const diff = e.clientX - touchStartX.current;
                currentSwipe.current = diff;
                setSwipeOffset(diff);
                if (Math.abs(diff) > 5) {
                    isSwiping.current = true;
                }
            };

            const onMouseUp = () => {
                if (!isDragging) return;
                setIsDragging(false);
                if (currentSwipe.current > 80) triggerPrev(); 
                else if (currentSwipe.current < -80) triggerNext(); 
                else setSwipeOffset(0); 
                touchStartX.current = null;
                currentSwipe.current = 0;
            };

            const safeHandleFlip = (e) => {
                if (isSwiping.current) {
                    isSwiping.current = false;
                    return;
                }
                if (flipLock.current || swipeOut) return;
                
                flipLock.current = true;
                setFlipAngle(prev => prev + 180);
                setTimeout(() => { flipLock.current = false; }, 400); 
            };

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (modalState.isOpen || !user) return;
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

                    if (e.key === 'ArrowRight') triggerNext();
                    else if (e.key === 'ArrowLeft') triggerPrev();
                    else if (e.key === ' ' || e.key === 'Enter') {
                        e.preventDefault(); 
                        safeHandleFlip();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentCardIndex, flipAngle, totalCards, modalState.isOpen, activeCategoryIndex, decks, filterStatus, user, triggerNext, triggerPrev]);

            const handleExport = () => {
                if (decks.length === 0) return;
                const dataStr = JSON.stringify(decks, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `flashcards_backup.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const handleFileChange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            if (window.confirm("確定要覆蓋目前資料嗎？操作無法復原。")) {
                                updateDecks(importedData);
                                setActiveCategoryIndex(0);
                                setCurrentCardIndex(0);
                                setFilterStatus('all');
                            }
                        }
                    } catch (error) {
                        alert("讀取失敗，檔案格式錯誤");
                    }
                };
                reader.readAsText(file);
                event.target.value = null; 
            };

            const handleSpeak = (e, text) => {
                if (e) e.stopPropagation();
                if (!text || !window.speechSynthesis) return;
                
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                if (/[\u3040-\u309f\u30a0-\u30ff]/.test(text)) {
                    utterance.lang = 'ja-JP'; 
                } else if (/^[A-Za-z0-9\s.,!?'-]+$/.test(text)) {
                    utterance.lang = 'en-US'; 
                } else {
                    utterance.lang = 'zh-TW'; 
                }

                try {
                    window.speechSynthesis.speak(utterance);
                } catch (error) {
                }
            };

            const handleCopyAIPrompt = (type) => {
                const promptText = type === '2sided' 
                    ? "請幫我製作字卡，並嚴格使用以下格式輸出（不要加上其他說明文字）：\n\n【正面】：(請填入單字或題目)\n【背面】：(請填入中文解釋)\n\n請給我至少 10 個單字。"
                    : "請幫我製作字卡，並嚴格使用以下格式輸出（不要加上其他說明文字）：\n\n【正面】：(請填入單字或題目)\n【中間】：(請填入假名或音標，若無可省略這行)\n【背面】：(請填入中文解釋)\n\n請給我至少 10 個單字。";
                
                navigator.clipboard.writeText(promptText).then(() => {
                    alert("✅ 已複製 AI 提示詞！\n\n💡 提醒：貼上給 AI 前，請記得自行修改括號內的內容，或是加上你指定的範圍與主題喔！");
                }).catch(() => {
                    alert("複製失敗，請手動複製。");
                });
            };

            const handleTextImport = () => {
                if (!formData.importText.trim()) return;
                const cards = [];
                const blocks = formData.importText.split(/【正面】(?:：|:)?/).filter(b => b.trim() !== '');
                
                blocks.forEach((block, index) => {
                    if (block.includes('【中間】')) {
                        const parts1 = block.split(/【中間】(?:：|:)?/);
                        const front = parts1[0].trim();
                        const parts2 = parts1[1].split(/【背面】(?:：|:)?/);
                        if (parts2.length >= 2) {
                            const middle = parts2[0].trim();
                            const back = parts2.slice(1).join('【背面】：').trim();
                            cards.push({ id: Date.now() + index, front, middle, back, note: '', status: 'unrated' });
                        }
                    } else {
                        const parts = block.split(/【背面】(?:：|:)?/);
                        if (parts.length >= 2) {
                            cards.push({ id: Date.now() + index, front: parts[0].trim(), back: parts.slice(1).join('【背面】：').trim(), note: '', status: 'unrated' });
                        }
                    }
                });
                
                if (cards.length === 0) {
                    alert("找不到符合格式的字卡，請確認是否包含「【正面】：」與「【背面】：」");
                    return;
                }

                if (decks.length === 0 || formData.importMode === 'new') {
                    const newName = formData.newDeckName.trim() || "新匯入卡組";
                    const newDecks = [...decks, { category: newName, color: formData.deckColor || '#503422', cards: cards }];
                    updateDecks(newDecks);
                    setActiveCategoryIndex(newDecks.length - 1);
                    setCurrentCardIndex(0);
                    setFilterStatus('all');
                } else {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards = [
                        ...newDecks[activeCategoryIndex].cards,
                        ...cards
                    ];
                    updateDecks(newDecks);
                }
                
                closeModal();
                setTimeout(() => alert(`🎉 成功匯入 ${cards.length} 張字卡！`), 100);
            };

            const handleFirstCard = () => {
                if (totalCards <= 1 || currentCardIndex === 0) return;
                setResetMode(true);
                setFlipAngle(0);
                setCurrentCardIndex(0);
                setTimeout(() => setResetMode(false), 50);
            };

            const handleShuffle = () => {
                if (totalCards <= 1) return;
                setResetMode(true);
                setFlipAngle(0);
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.forEach((c, i) => {
                    if (!c.id) c.id = Date.now() + i;
                });
                newDecks[activeCategoryIndex].cards.sort(() => Math.random() - 0.5);
                updateDecks(newDecks);
                setCurrentCardIndex(0);
                setTimeout(() => setResetMode(false), 50);
            };

            const handleRestoreOrder = () => {
                if (totalCards <= 1) return;
                setResetMode(true);
                setFlipAngle(0);
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.sort((a, b) => (a.id || 0) - (b.id || 0));
                updateDecks(newDecks);
                setCurrentCardIndex(0);
                setTimeout(() => setResetMode(false), 50);
            };

            const handleToggleStar = (originalIdx) => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[originalIdx].isStarred = !newDecks[activeCategoryIndex].cards[originalIdx].isStarred;
                updateDecks(newDecks);
            };

            const handleRateAndNext = (e, status) => {
                if (e) e.stopPropagation();
                if (!currentCard || swipeOut || flipLock.current) return;

                setSwipeOut('left'); 

                setTimeout(() => {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards[currentCard.originalIndex].status = status;
                    updateDecks(newDecks); 
                    
                    setResetMode(true);
                    setFlipAngle(0);
                    setSwipeOffset(0);
                    setSwipeOut(null);

                    if (filterStatus === 'all' || filterStatus === status || filterStatus === 'starred') {
                        setCurrentCardIndex(prev => (prev + 1) % totalCards);
                    } else {
                        setCurrentCardIndex(prev => {
                            const newTotal = totalCards - 1;
                            if (newTotal <= 0) return 0;
                            return prev >= newTotal ? 0 : prev;
                        });
                    }

                    setTimeout(() => setResetMode(false), 50);
                }, 300);
            };

            const handleUpdateCardStatus = (originalIdx, newStatus) => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards[originalIdx].status = newStatus;
                updateDecks(newDecks);
            };

            const handleDeleteCardFromList = (originalIdx) => {
                if(window.confirm("確定刪除這張卡片嗎？操作無法復原。")) {
                    const newDecks = [...decks];
                    newDecks[activeCategoryIndex].cards.splice(originalIdx, 1);
                    updateDecks(newDecks);
                    setCurrentCardIndex(prev => Math.max(0, prev - 1));
                    
                    const newSelected = new Set(selectedCards);
                    if(newSelected.has(originalIdx)) {
                        newSelected.delete(originalIdx);
                        setSelectedCards(newSelected);
                    }
                }
            };

            const handleBatchDelete = () => {
                if(selectedCards.size === 0) return;
                if(window.confirm(`確定要刪除選取的 ${selectedCards.size} 張卡片嗎？操作無法復原。`)) {
                    const newDecks = [...decks];
                    const indices = Array.from(selectedCards).sort((a,b)=>b-a);
                    indices.forEach(idx => {
                        newDecks[activeCategoryIndex].cards.splice(idx, 1);
                    });
                    updateDecks(newDecks);
                    setSelectedCards(new Set());
                    setCurrentCardIndex(0);
                }
            };

            const handleBatchStatus = (status) => {
                if(selectedCards.size === 0 || !status) return;
                const newDecks = [...decks];
                selectedCards.forEach(idx => {
                    newDecks[activeCategoryIndex].cards[idx].status = status;
                });
                updateDecks(newDecks);
                setSelectedCards(new Set());
            };

            const openEditModal = (originalIdx) => {
                const card = allCards[originalIdx];
                setFormData({
                    ...formData,
                    cardFront: card.front || '',
                    cardMiddle: card.middle || '',
                    cardBack: card.back || '',
                    note: card.note || '',
                    cardType: card.middle ? '3sided' : '2sided',
                    editIndex: originalIdx
                });
                setModalState({ isOpen: true, type: 'editCard' });
            };

            const handleAddDeck = () => {
                if (!formData.deckName.trim()) return;
                const newDecks = [...decks, { category: formData.deckName, color: formData.deckColor || '#503422', cards: [] }];
                updateDecks(newDecks);
                setActiveCategoryIndex(newDecks.length - 1);
                setCurrentCardIndex(0);
                setFilterStatus('all');
                setFlipOrder('FMB');
                closeModal();
            };

            const handleUpdateDeckColor = (newColor) => {
                if (decks.length === 0) return;
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].color = newColor;
                updateDecks(newDecks);
            };

            const handleAddCard = () => {
                if (!formData.cardFront.trim() || !formData.cardBack.trim()) return;
                const newDecks = [...decks];
                const newCard = { id: Date.now(), front: formData.cardFront, back: formData.cardBack, note: '', status: 'unrated' }; 
                
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) {
                    newCard.middle = formData.cardMiddle;
                }

                newDecks[activeCategoryIndex].cards.push(newCard);
                updateDecks(newDecks);
                if (filterStatus !== 'all' && filterStatus !== 'unrated') setFilterStatus('all');
                setCurrentCardIndex(newDecks[activeCategoryIndex].cards.length - 1);
                closeModal();
            };

            const handleEditCardSave = () => {
                if (!formData.cardFront.trim() || !formData.cardBack.trim() || formData.editIndex === null) return;
                const newDecks = [...decks];
                const updatedCard = { ...newDecks[activeCategoryIndex].cards[formData.editIndex], front: formData.cardFront, back: formData.cardBack, note: formData.note };
                
                if (formData.cardType === '3sided' && formData.cardMiddle.trim()) {
                    updatedCard.middle = formData.cardMiddle;
                } else {
                    delete updatedCard.middle; 
                }

                newDecks[activeCategoryIndex].cards[formData.editIndex] = updatedCard;
                updateDecks(newDecks);
                closeModal();
            };

            const handleDeleteDeck = () => {
                const newDecks = decks.filter((_, idx) => idx !== activeCategoryIndex);
                updateDecks(newDecks);
                setActiveCategoryIndex(Math.max(0, activeCategoryIndex - 1));
                setCurrentCardIndex(0);
                setFilterStatus('all');
                setFlipOrder('FMB');
                closeModal();
            };

            const handleDeleteCard = () => {
                const newDecks = [...decks];
                newDecks[activeCategoryIndex].cards.splice(currentCard.originalIndex, 1);
                updateDecks(newDecks);
                setCurrentCardIndex(Math.max(0, currentCardIndex - 1));
                closeModal();
            };

            const closeModal = () => {
                // 🌟 核心修改 3：設定更新也會同步到後端
                if (modalState.type === 'settings' && user) {
                    const newSettings = { buttonColor, cardTextColor, cardTextSize };
                    syncToCloud(decks, newSettings);
                }
                
                setModalState({ isOpen: false, type: null });
                setFormData(prev => ({ ...prev, deckName: '', deckColor: '#503422', cardFront: '', cardMiddle: '', cardBack: '', note: '', importText: '', newDeckName: '', editIndex: null }));
                setSelectedCards(new Set()); 
            };

            const getCalculatedFontSize = (text) => {
                if (cardTextSize !== '36') return `${cardTextSize}px`; 
                if (!text) return '36px';
                const len = text.length;
                if (len > 60) return '18px';
                if (len > 40) return '22px';
                if (len > 20) return '26px';
                if (len > 12) return '30px';
                return '36px';
            };

            const faces = React.useMemo(() => {
                if (!currentCard) return [];
                const faceMap = {
                    F: { label: '正面', text: currentCard.front, theme: 'front' },
                    M: currentCard.middle ? { label: '中間', text: currentCard.middle, theme: 'middle' } : null,
                    B: { label: '背面', text: currentCard.back, theme: 'back' }
                };
                const orderArr = flipOrder.split('');
                const resultFaces = orderArr.map(key => faceMap[key]).filter(Boolean);
                return resultFaces.length > 0 ? resultFaces : [faceMap.F, faceMap.B];
            }, [currentCard, flipOrder]);

            const totalFaces = faces.length;
            const targetStep = Math.floor(flipAngle / 180);
            
            const frontStep = targetStep % 2 === 0 ? targetStep : targetStep - 1;
            const backStep = targetStep % 2 === 1 ? targetStep : Math.max(0, targetStep - 1);

            const domFrontFace = totalFaces > 0 ? faces[frontStep % totalFaces] : null;
            const domBackFace = totalFaces > 0 ? faces[backStep % totalFaces] : null;

            const getFaceClasses = (theme) => {
                if (theme === 'front') return { bg: 'bg-white', badgeText: 'text-blue-500', badgeBg: 'bg-blue-50', trashClass: 'text-gray-300 hover:text-red-500 hover:bg-red-50' };
                if (theme === 'middle') return { bg: 'bg-white', badgeText: 'text-emerald-600', badgeBg: 'bg-emerald-100', trashClass: 'text-gray-300 hover:text-red-500 hover:bg-red-50' };
                if (theme === 'back') return { bg: 'bg-white', badgeText: 'text-yellow-600', badgeBg: 'bg-yellow-50', trashClass: 'text-gray-300 hover:text-red-500 hover:bg-red-50' };
                return { bg: 'bg-white' };
            };

            const frontTheme = getFaceClasses(domFrontFace?.theme);
            const backTheme = getFaceClasses(domBackFace?.theme);

            const renderStatusBadge = (status) => {
                const config = {
                    unrated: { bg: 'bg-gray-100', text: 'text-gray-500', label: '⚪ 尚未評估', border: 'border-gray-200' },
                    mastered: { bg: 'bg-green-50', text: 'text-green-700', label: '🟢 精熟', border: 'border-green-200' },
                    familiar: { bg: 'bg-yellow-50', text: 'text-yellow-700', label: '🟡 有印象', border: 'border-yellow-200' },
                    unfamiliar: { bg: 'bg-red-50', text: 'text-red-700', label: '🔴 不熟', border: 'border-red-200' }
                };
                const current = config[status] || config.unrated;
                return (
                    <div className={`absolute top-5 right-5 text-xs font-bold px-3 py-1.5 rounded-full border shadow-sm ${current.bg} ${current.text} ${current.border}`} style={{ transform: 'translateZ(10px)' }}>
                        {current.label}
                    </div>
                );
            };

            const maxDrag = 150; 
            let visualSwipe = swipeOffset;
            if (Math.abs(swipeOffset) > maxDrag) {
                visualSwipe = Math.sign(swipeOffset) * (maxDrag + (Math.abs(swipeOffset) - maxDrag) * 0.15);
            }
            
            let swipeTransform = '';
            let currentOpacity = 1;

            if (swipeOut === 'left') {
                swipeTransform = `translate3d(-250px, 0, 0)`; 
                currentOpacity = 0;
            } else if (swipeOut === 'right') {
                swipeTransform = `translate3d(250px, 0, 0)`; 
                currentOpacity = 0;
            } else {
                swipeTransform = `translate3d(${visualSwipe}px, 0, 0)`; 
                if (isDragging) {
                    currentOpacity = Math.max(0.2, 1 - (Math.abs(swipeOffset) / 250));
                }
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4 overflow-hidden">
                    <style>{`
                        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
                        
                        .card-perspective { perspective: 1200px; }
                        .card-flipper { transform-style: preserve-3d; }
                        .card-face {
                            position: absolute; top: 0; left: 0;
                            width: 100%; height: 100%;
                            backface-visibility: hidden;
                            -webkit-backface-visibility: hidden;
                        }
                        .face-front { transform: rotateY(0deg) translateZ(1px); }
                        .face-back { transform: rotateY(180deg) translateZ(1px); }
                        
                        .no-select { 
                            user-select: none; 
                            -webkit-user-select: none; 
                            touch-action: pan-y !important;
                        }
                    `}</style>

                    <div className="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3">
                            <Icons.Cloud className="w-8 h-8 transition-colors" style={{ color: buttonColor === '#EBE6E0' ? '#3b82f6' : buttonColor }} />
                            <h1 className="text-3xl font-black text-gray-800 tracking-wide">苗寶雲端字卡</h1>
                        </div>
                        
                        {user && (
                            <div className="flex items-center gap-3 bg-white p-2 pr-5 rounded-full shadow-sm border border-gray-200">
                                <img src={user.photoURL} className="w-9 h-9 rounded-full border border-gray-100" />
                                <span className="text-sm font-bold text-gray-700">{user.displayName}</span>
                                <button onClick={handleLogout} className="text-xs text-red-500 hover:text-red-700 ml-2 font-medium bg-red-50 px-3 py-1 rounded-full">
                                    {user.isGuest ? '離開' : '登出'}
                                </button>
                            </div>
                        )}
                    </div>

                    {!user ? (
                        <div className="w-full max-w-2xl bg-white p-12 rounded-3xl shadow-xl text-center border mt-10">
                            <div className="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 transition-colors" style={{ color: buttonColor === '#EBE6E0' ? '#3b82f6' : buttonColor, backgroundColor: buttonColor === '#EBE6E0' ? '#eff6ff' : buttonColor + '20' }}>
                                <Icons.Cloud className="w-12 h-12" />
                            </div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-4">歡迎使用雲端同步系統</h2>
                            <p className="text-gray-500 mb-8 leading-relaxed">登入後即可在電腦與手機間自動同步字卡。<br/>你辛苦建立的單字庫，隨時隨地學習不中斷！</p>
                            
                            <div className="flex flex-col gap-4 max-w-sm mx-auto">
                                <button onClick={handleLogin} className="bg-gray-800 text-white px-6 py-4 rounded-2xl font-bold hover:bg-black transition-colors shadow-lg">
                                    🔑 使用 Google 帳號登入
                                </button>
                                <button onClick={handleGuestLogin} className="bg-white border-2 border-gray-200 text-gray-600 px-6 py-4 rounded-2xl font-bold hover:bg-gray-50 transition-colors shadow-sm">
                                    👤 訪客試用模式 (單機儲存)
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="w-full max-w-4xl">
                            <div className="flex flex-wrap justify-center gap-3 mb-8 items-center">
                                <button onClick={() => setModalState({ isOpen: true, type: 'importText' })} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700 h-[38px]">
                                    <Icons.FileText className="w-4 h-4 mr-2" /> 快速匯入文字
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700 h-[38px]">
                                    <Icons.Upload className="w-4 h-4 mr-2" /> 匯入備份 (覆蓋)
                                </button>
                                <button onClick={handleExport} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700 h-[38px]">
                                    <Icons.Download className="w-4 h-4 mr-2" /> 匯出備份 (JSON)
                                </button>
                                
                                <button onClick={() => setModalState({ isOpen: true, type: 'settings' })} className="text-sm bg-white border px-4 py-2 rounded-full hover:bg-gray-50 transition-colors flex items-center shadow-sm text-gray-700 h-[38px]">
                                    ⚙️ 外觀設定
                                </button>

                                <input type="file" accept=".json" ref={fileInputRef} onChange={handleFileChange} className="hidden" />
                            </div>

                            {decks.length === 0 ? (
                                <div className="w-full max-w-2xl mx-auto bg-white p-12 rounded-3xl border-2 border-dashed border-gray-300 text-center">
                                    <Icons.PlusCircle style={{ color: buttonColor === '#EBE6E0' ? '#93c5fd' : buttonColor }} />
                                    <h2 className="text-xl font-bold text-gray-700 mb-4">尚未建立卡組</h2>
                                    <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} style={{ backgroundColor: buttonColor, color: '#1f2937' }} className="px-6 py-2 rounded-full font-bold transition-all hover:brightness-95 shadow-sm">建立新卡組</button>
                                </div>
                            ) : (
                                <div className="w-full max-w-2xl mx-auto">
                                    <div className="flex overflow-x-auto custom-scrollbar bg-white p-2 rounded-2xl mb-6 border border-gray-200 gap-2 items-center shadow-sm">
                                        {decks.map((cat, i) => {
                                            const deckColor = cat.color || '#503422';
                                            const isActive = activeCategoryIndex === i;
                                            return (
                                                <button 
                                                    key={i} 
                                                    onClick={() => { setActiveCategoryIndex(i); setResetMode(true); setCurrentCardIndex(0); setFlipAngle(0); setFilterStatus('all'); setFlipOrder('FMB'); setShowNote(false); setTimeout(()=>setResetMode(false), 50); }} 
                                                    className={`flex-shrink-0 px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all flex items-center gap-2 border-2 ${isActive ? 'shadow-md bg-white' : 'border-transparent text-gray-600 hover:bg-gray-100'}`}
                                                    style={isActive ? { borderColor: deckColor, color: '#1f2937' } : {}}
                                                >
                                                    <span className="w-3 h-3 rounded-full shadow-sm" style={{ backgroundColor: deckColor }}></span>
                                                    {cat.category}
                                                </button>
                                            );
                                        })}
                                        <div className="w-px h-6 bg-gray-200 mx-1 flex-shrink-0"></div>
                                        <button onClick={() => setModalState({ isOpen: true, type: 'addDeck' })} style={{ backgroundColor: buttonColor, color: '#1f2937' }} className="flex-shrink-0 px-4 py-2 text-sm font-bold rounded-xl transition-all hover:brightness-95 flex items-center shadow-sm">
                                            <Icons.Plus className="w-4 h-4 mr-1 border-2 border-current rounded-full" /> 新增卡組
                                        </button>
                                    </div>

                                    <div className="flex flex-wrap justify-between items-center mb-4 px-2 gap-3">
                                        <div className="flex items-center gap-2 md:gap-3">
                                            <span className="font-bold text-gray-800 text-xl">{currentCategory.category}</span>
                                        </div>
                                        
                                        <div className="flex items-center gap-2">
                                            {allCards.length > 0 && (
                                                <React.Fragment>
                                                    <select value={filterStatus} onChange={(e) => {setFilterStatus(e.target.value); setResetMode(true); setCurrentCardIndex(0); setFlipAngle(0); setShowNote(false); setTimeout(()=>setResetMode(false), 50); }} className="text-sm font-bold px-2 md:px-3 py-2 rounded-xl bg-white border border-gray-200 text-gray-600 outline-none hover:bg-gray-50 cursor-pointer shadow-sm">
                                                        <option value="all">全部卡片</option>
                                                        <option value="starred">⭐ 星號標記</option>
                                                        <option value="unfamiliar">🔴 不熟</option>
                                                        <option value="familiar">🟡 有印象</option>
                                                        <option value="mastered">🟢 精熟</option>
                                                    </select>
                                                    <button onClick={() => setModalState({isOpen: true, type: 'cardList'})} style={{ backgroundColor: buttonColor, color: '#1f2937' }} className="text-sm font-bold px-3 py-2 rounded-xl transition-all hover:brightness-95 flex items-center shadow-sm whitespace-nowrap">
                                                        <Icons.List className="w-4 h-4 md:mr-1.5" /> <span className="hidden md:inline">列表管理</span><span className="md:hidden">列表</span>
                                                    </button>
                                                </React.Fragment>
                                            )}
                                            <button onClick={() => setModalState({ isOpen: true, type: 'deleteDeck' })} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors shadow-sm bg-white border border-gray-200 flex-shrink-0" title="刪除卡組">
                                                <Icons.Trash2 className="w-4 h-4" />
                                            </button>
                                        </div>
                                    </div>

                                    <div className="card-perspective aspect-[4/3] md:aspect-[16/10] mb-3 w-full">
                                        {totalCards === 0 ? (
                                            <div className="w-full h-full bg-white rounded-3xl border-2 border-dashed border-gray-300 flex items-center justify-center flex-col shadow-sm">
                                                {filterStatus !== 'all' ? (
                                                    <React.Fragment>
                                                        <div className="text-5xl mb-4 opacity-50">📭</div>
                                                        <span className="text-gray-500 font-bold mb-4">這個篩選條件下目前沒有卡片喔！</span>
                                                        <button onClick={() => setFilterStatus('all')} className="text-blue-600 font-bold hover:bg-blue-50 px-6 py-2 rounded-full transition-colors flex items-center border border-blue-200">
                                                            返回全部卡片
                                                        </button>
                                                    </React.Fragment>
                                                ) : (
                                                    <button onClick={() => setModalState({ isOpen: true, type: 'addCard' })} style={{ backgroundColor: buttonColor, color: '#1f2937' }} className="font-bold px-6 py-3 rounded-full transition-all hover:brightness-95 flex items-center shadow-sm">
                                                        <Icons.Plus className="w-5 h-5 mr-1" /> 新增第一張字卡
                                                    </button>
                                                )}
                                            </div>
                                        ) : (
                                            <div 
                                                className={`relative w-full h-full cursor-pointer no-select ${swipeOut ? 'transition-all duration-300' : (isDragging ? '' : 'transition-all duration-300')}`}
                                                style={{ 
                                                    transform: swipeTransform, 
                                                    opacity: currentOpacity,
                                                    touchAction: 'pan-y'
                                                }}
                                                onTouchStart={onTouchStart}
                                                onTouchMove={onTouchMove}
                                                onTouchEnd={onTouchEnd}
                                                onTouchCancel={onTouchEnd}
                                                onMouseDown={onMouseDown}
                                                onMouseMove={onMouseMove}
                                                onMouseUp={onMouseUp}
                                                onMouseLeave={onMouseUp}
                                                onDragStart={(e) => e.preventDefault()}
                                                onClick={safeHandleFlip}
                                            >
                                                <div 
                                                    className="w-full h-full card-flipper"
                                                    style={{ 
                                                        transform: `rotateY(${flipAngle}deg)`, 
                                                        transition: resetMode ? 'none' : 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)'

                                                <input autoFocus type="text" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-4 focus:border-blue-500 focus:bg-white outline-none text-sm transition-colors" placeholder="輸入新卡組名稱 (未輸入預設為：新匯入卡組)" value={formData.newDeckName} onChange={e => setFormData({...formData, newDeckName: e.target.value})} />
                                                <div className="flex items-center gap-3 mb-6 bg-gray-50 p-4 rounded-2xl border-2 border-gray-100">
                                                    <label className="text-sm font-bold text-gray-700">選擇卡組專屬顏色：</label>
                                                    <div className="flex items-center gap-2">
                                                        <div className="relative w-8 h-8 rounded-full overflow-hidden border border-gray-300 shadow-sm shrink-0">
                                                            <input type="color" value={formData.deckColor} onChange={e => setFormData({...formData, deckColor: e.target.value})} className="absolute inset-[-10px] w-12 h-12 cursor-pointer" />
                                                        </div>
                                                        <input type="text" value={formData.deckColor} onChange={e => setFormData({...formData, deckColor: e.target.value})} className="w-20 text-sm font-mono uppercase bg-white border border-gray-300 rounded px-2 py-1 text-gray-700 outline-none focus:border-blue-500" placeholder="#HEX" maxLength="7" title="輸入16進位色號" />
                                                    </div>
                                                </div>
                                            </React.Fragment>
                                        )}
                                        
                                        <textarea rows="6" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-6 text-sm focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" placeholder={"格式一(雙面)：\n【正面】：Apple\n【背面】：蘋果\n\n格式二(三面)：\n【正面】：猫\n【中間】：ねこ\n【背面】：貓咪"} value={formData.importText} onChange={e => setFormData({...formData, importText: e.target.value})}></textarea>
                                        <button onClick={handleTextImport} className="w-full py-4 rounded-2xl font-bold transition-all hover:brightness-95 shadow-lg" style={{ backgroundColor: buttonColor, color: '#1f2937' }}>解析並建立儲存</button>
                                    </div>
                                )}

                                {(modalState.type === 'addCard' || modalState.type === 'editCard') && (
                                    <div>
                                        <h3 className="text-xl font-bold mb-4 text-gray-800 pr-10">{modalState.type === 'editCard' ? '編輯字卡' : '新增字卡'}</h3>
                                        
                                        <div className="flex gap-4 mb-5 bg-gray-50 p-3 rounded-2xl">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={formData.cardType === '2sided'} onChange={() => setFormData({...formData, cardType: '2sided'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                <span className="text-sm font-bold text-gray-700">雙面字卡</span>
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="radio" checked={formData.cardType === '3sided'} onChange={() => setFormData({...formData, cardType: '3sided'})} className="text-blue-600 focus:ring-blue-500 w-4 h-4" />
                                                <span className="text-sm font-bold text-gray-700">三面字卡</span>
                                            </label>
                                        </div>

                                        <div className="max-h-[50vh] overflow-y-auto custom-scrollbar pr-2 mb-4">
                                            {formData.cardType === '3sided' ? (
                                                <React.Fragment>
                                                    <textarea autoFocus rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-3 rounded-xl mb-3 focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" placeholder="正面內容 (如：猫)" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                                    <textarea rows="2" className="w-full border-2 border-gray-100 bg-emerald-50 p-3 rounded-xl mb-3 focus:border-emerald-500 focus:bg-white outline-none resize-none transition-colors" placeholder="中間內容 (如：ねこ)" value={formData.cardMiddle} onChange={e => setFormData({...formData, cardMiddle: e.target.value})}></textarea>
                                                    <textarea rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-3 rounded-xl mb-3 focus:border-yellow-400 focus:bg-white outline-none resize-none transition-colors" placeholder="背面內容 (如：貓咪)" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <textarea autoFocus rows="2" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-4 focus:border-blue-500 focus:bg-white outline-none resize-none transition-colors" placeholder="正面內容 (單字/題目)" value={formData.cardFront} onChange={e => setFormData({...formData, cardFront: e.target.value})}></textarea>
                                                    <textarea rows="3" className="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-2xl mb-4 focus:border-yellow-400 focus:bg-white outline-none resize-none transition-colors" placeholder="背面內容 (翻譯/解答)" value={formData.cardBack} onChange={e => setFormData({...formData, cardBack: e.target.value})}></textarea>
                                                </React.Fragment>
                                            )}
                                        </div>
                                        
                                        <button onClick={modalState.type === 'editCard' ? handleEditCardSave : handleAddCard} className="w-full py-4 rounded-2xl font-bold transition-all hover:brightness-95 shadow-lg" style={{ backgroundColor: buttonColor, color: '#1f2937' }}>儲存建立</button>
                                    </div>
                                )}

                                {(modalState.type === 'deleteDeck' || modalState.type === 'deleteCard') && (
                                    <div className="text-center pt-4">
                                        <div className="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500">
                                            <Icons.Trash2 className="w-10 h-10" />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 text-gray-800 pr-10">確定要刪除嗎？</h3>
                                        <p className="text-gray-500 mb-8 font-medium">刪除後資料也將移除，操作無法復原。</p>
                                        <div className="flex gap-4">
                                            <button onClick={closeModal} className="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-colors">取消</button>
                                            <button onClick={modalState.type === 'deleteDeck' ? handleDeleteDeck : handleDeleteCard} className="flex-1 bg-red-500 text-white font-bold py-4 rounded-2xl hover:bg-red-600 transition-colors shadow-lg">確定刪除</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
